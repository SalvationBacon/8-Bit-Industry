<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="8-BIT INDUSTRY">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>8-BIT INDUSTRY</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d0d;
  --bg2:     #111;
  --bg3:     #1a1a1a;
  --panel:   #0f0f0f;
  --border:  #222;
  --border2: #333;
  --amber:   #f5a623;
  --amberDim:#7a5010;
  --teal:    #26c6a0;
  --tealDim: #0d4a3a;
  --green:   #4caf50;
  --red:     #e53935;
  --blue:    #42a5f5;
  --purple:  #ab47bc;
  --text:    #e8e8e8;
  --text2:   #999;
  --text3:   #555;
  --font:    'Press Start 2P', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:8px;user-select:none;-webkit-tap-highlight-color:transparent}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
.screen{position:fixed;inset:0}
.hidden{display:none!important}

/* ── TITLE ── */
#sTitle{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
.title-grid{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(255,255,255,.012) 47px,rgba(255,255,255,.012) 48px),repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(255,255,255,.012) 47px,rgba(255,255,255,.012) 48px)}
.title-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 50% 35% at 50% 55%,rgba(245,166,35,.07) 0%,transparent 70%)}
.logo{position:relative;text-align:center;margin-bottom:44px}
.logo-8{display:block;font-size:clamp(22px,8vw,36px);color:var(--amber);letter-spacing:6px;text-shadow:0 0 24px rgba(245,166,35,.5),3px 3px 0 #000;animation:flicker 5s infinite}
.logo-rest{display:block;font-size:clamp(9px,3vw,13px);color:var(--text);letter-spacing:10px;margin-top:8px;text-shadow:2px 2px 0 #000}
@keyframes flicker{0%,91%,95%,100%{opacity:1}92%,94%{opacity:.65}}
.logo-icon{font-size:36px;display:block;margin-bottom:14px;animation:bob 2.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,.4)}50%{box-shadow:0 0 0 6px rgba(245,166,35,0)}}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(-6px)}}
.tagline{color:var(--text3);font-size:5px;letter-spacing:4px;margin-bottom:44px}
.btn{font-family:var(--font);font-size:8px;padding:12px 28px;cursor:pointer;background:transparent;color:var(--amber);border:2px solid var(--amber);letter-spacing:1px;transition:all .1s}
.btn::before{content:'▶ '}
.btn:hover,.btn:active{background:var(--amber);color:#000;box-shadow:0 0 18px rgba(245,166,35,.45)}
.btn-sm{font-size:6px;padding:9px 18px}
.btn-teal{color:var(--teal);border-color:var(--teal)}
.btn-teal::before{content:'▶ '}
.btn-teal:hover,.btn-teal:active{background:var(--teal);color:#000}
.btn-red{color:var(--red);border-color:var(--red)}
.btn-red:hover,.btn-red:active{background:var(--red);color:#000}
.v-num{color:var(--text3);font-size:5px;margin-top:28px}

/* ── GAME SHELL ── */
#sGame{display:flex;flex-direction:column}

/* HUD */
#hud{flex-shrink:0;height:48px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 4px;gap:4px;z-index:100;overflow:hidden}
.hud-logo{color:var(--amber);font-size:7px;padding-right:6px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0}
#hudZones{display:flex;gap:2px;padding-right:6px;border-right:1px solid var(--border);flex-shrink:0}
.zone-tab{font-family:var(--font);font-size:5px;padding:4px 6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:not-allowed;white-space:nowrap}
.zone-tab.active{border-color:var(--amber);color:var(--amber);cursor:default}
.zone-tab.locked{opacity:.35}
#hudRes{display:flex;gap:4px;align-items:center;padding:0 4px;flex-shrink:0}
@media(max-width:420px){#hudZones{display:none}.hud-logo{display:none}#hudRes{gap:3px;padding:0 2px}}
.hres{display:flex;align-items:center;gap:3px;white-space:nowrap}
.hres-icon{font-size:14px;line-height:1}
.hres-val{color:var(--amber);font-size:8px;min-width:32px}
.hud-btns{display:flex;gap:3px;flex:1;overflow-x:auto;scrollbar-width:none;min-width:0}
.hud-btns::-webkit-scrollbar{display:none}
.hbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:15px;padding:5px 0;cursor:pointer;transition:all .1s;border-radius:3px;flex-shrink:0;width:36px;text-align:center}
.hbtn:hover{border-color:var(--amber);color:var(--amber)}
.hbtn.on{border-color:var(--amber);color:var(--amber);background:rgba(245,166,35,.08)}

/* CANVAS */
#wrap{flex:1;position:relative;overflow:hidden;background:#090909;cursor:crosshair}
#canvas{position:absolute;top:0;left:0;image-rendering:pixelated;cursor:crosshair}

/* TOOLBAR */
#toolbar{flex-shrink:0;height:70px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;z-index:100;scrollbar-width:none;gap:1px}
#toolbar::-webkit-scrollbar{display:none}
.tcat{display:flex;flex-direction:column;border-right:1px solid var(--border)}
.tcat-lbl{color:var(--text3);font-size:4px;padding:3px 6px 1px;letter-spacing:1px}
.titems{display:flex;align-items:center;padding:0 4px;gap:2px;flex:1}
.titem{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 7px;cursor:pointer;border:1px solid transparent;min-width:50px;font-family:var(--font);background:transparent;transition:all .1s}
.titem:hover{border-color:var(--border2);background:var(--bg3)}
.titem.sel{border-color:var(--amber);background:rgba(245,166,35,.08)}
.titem.sel .tname{color:var(--amber)}
.titem.locked{opacity:.3;cursor:not-allowed}
.titem.locked:hover{border-color:transparent;background:transparent}
.titem.unaffordable{opacity:.4;filter:grayscale(0.7)}
.titem.unaffordable:hover{border-color:var(--border);background:transparent}
.titem.stub{opacity:.5;cursor:default}
.titem.stub:hover{border-color:var(--border2);background:var(--bg3)}
.ticon{font-size:20px;line-height:1}
.tname{color:var(--text3);font-size:4px;text-align:center;white-space:nowrap}

/* SIDE PANEL */
.spanel{position:fixed;top:44px;right:0;bottom:70px;width:min(300px,88vw);background:#111;border-left:2px solid var(--border2);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .18s}
.spanel.open{transform:translateX(0)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:2px solid var(--border2);flex-shrink:0;background:#0f0f0f}
.ph-title{color:var(--amber);font-size:8px}
.ph-x{background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:2px 6px}
.ph-x:hover{color:var(--red)}
.pbody{flex:1;overflow-y:auto;padding:14px;font-size:6px;line-height:1.9}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:var(--border2)}

/* TOASTS */
#toasts{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column-reverse;gap:5px;align-items:center;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--border2);padding:7px 14px;font-size:6px;white-space:nowrap;animation:tin .15s ease-out,tout .25s ease-in 1.75s forwards}
.toast.ok{border-color:var(--teal);color:var(--teal)}
.toast.bad{border-color:var(--red);color:var(--red)}
.toast.wrn{border-color:var(--amber);color:var(--amber)}

/* MODAL */
#mOverlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--panel);border:2px solid var(--border2);width:min(380px,92vw);max-height:80vh;display:flex;flex-direction:column}
.mh{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;border-bottom:1px solid var(--border)}
.mh-title{color:var(--amber);font-size:8px}
.mb{padding:14px;overflow-y:auto;flex:1;line-height:1.8}
.mf{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}

/* MISC */
.sec-label{font-size:6px;color:var(--teal);letter-spacing:2px;margin-bottom:7px;display:block}
.irow{display:flex;justify-content:space-between;font-size:6px;margin-bottom:6px}
.irow .lbl{color:var(--text2)}
.prog-wrap{height:6px;background:var(--bg);border:1px solid var(--border2);margin:4px 0}
.prog-fill{height:100%;background:var(--teal);transition:width .1s}
.prog-fill.amber{background:var(--amber)}
.prog-fill.green{background:var(--green)}
.card{border:1px solid var(--border2);background:var(--bg3);padding:10px;margin-bottom:9px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.inv-item{border:1px solid var(--border2);background:var(--bg3);padding:6px 3px;display:flex;flex-direction:column;align-items:center;gap:2px}
.inv-item .ii{font-size:18px}
.inv-item .iv{font-size:6px;color:var(--amber)}
.inv-item .in{font-size:5px;color:var(--text2);text-align:center;line-height:1.4}
.craft-row{display:flex;align-items:center;justify-content:space-between;padding:8px;border:1px solid var(--border2);background:var(--bg3);margin-bottom:5px}
.mini-btn{font-family:var(--font);font-size:5px;padding:6px 10px;border:1px solid var(--border2);background:transparent;cursor:pointer}
.mini-btn.amber{border-color:var(--amber);color:var(--amber)}
.mini-btn.amber:hover{background:rgba(245,166,35,.1)}
.mini-btn.dim{color:var(--text3);cursor:not-allowed}
.mini-btn.teal{border-color:var(--teal);color:var(--teal)}
.mini-btn.teal:hover{background:rgba(38,198,160,.1)}
.mini-btn.red{border-color:var(--red);color:var(--red)}
.mini-btn.red:hover{background:rgba(229,57,53,.1)}
.full-btn{width:100%;font-family:var(--font);font-size:6px;padding:10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;margin-bottom:5px;text-align:left}
.full-btn.amber{border-color:var(--amber);color:var(--amber)}
.full-btn.amber:hover{background:rgba(245,166,35,.08)}
.full-btn.teal{border-color:var(--teal);color:var(--teal)}
.full-btn.teal:hover{background:rgba(38,198,160,.08)}
.full-btn.launch{border:2px solid var(--amber);color:var(--amber);font-size:7px;padding:12px;text-align:center;animation:pulse 1.2s infinite}
.tech-card{border:1px solid var(--border);background:var(--bg3);padding:9px;margin-bottom:6px;transition:border-color .15s}
.tech-card.done{border-color:var(--teal)}
.tech-card.avail{border-color:var(--amberDim)}
.tech-card.locked{opacity:.4}
.rocket-part{display:flex;align-items:center;justify-content:space-between;padding:9px;border:1px solid var(--border);background:var(--bg3);margin-bottom:5px}
.rocket-part.done{border-color:var(--teal)}
.stat-machine{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border:1px solid var(--border);background:var(--bg3);margin-bottom:3px;font-size:5px}
.stat-machine.stalled{border-color:var(--red)}
.stat-machine.starved{border-color:var(--amber)}
.stat-machine.norecipe{border-color:var(--text3)}
.stat-machine.ok{border-color:var(--border)}
select.game-sel{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:5px;padding:7px;margin-bottom:8px;cursor:pointer}
select.game-sel:focus{outline:none;border-color:var(--amber)}

/* Tool tooltip */
#toolTip{
  position:absolute; top:8px; left:8px;
  width:min(220px,55vw);
  background:rgba(10,10,10,.93);
  border:1px solid var(--border2);
  padding:10px;
  pointer-events:none;
  z-index:90;
  transition:opacity .12s;
}
#toolTip.hidden{display:none}
.tt-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.tt-icon{font-size:18px;line-height:1;flex-shrink:0}
.tt-name{color:var(--amber);font-size:7px}
.tt-desc{font-size:5px;color:var(--text2);line-height:1.9;margin-bottom:6px}
.tt-cost{font-size:5px;color:var(--text3);margin-bottom:6px}
.tt-cost span{color:var(--amber)}
.tt-recipes{border-top:1px solid var(--border);padding-top:6px}
.tt-rlabel{font-size:4px;color:var(--text3);letter-spacing:1px;margin-bottom:4px}
.tt-recipe{font-size:5px;color:var(--text2);margin-bottom:4px;line-height:1.7;padding:4px;border:1px solid var(--border);background:var(--bg3)}
.tt-recipe .tt-rin{color:var(--blue)}
.tt-recipe .tt-rout{color:var(--amber)}
.tt-recipe .tt-rtime{color:var(--text3)}
#resInfo{
  position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
  bottom:80px;width:min(280px,88vw);z-index:300;
  opacity:0;transition:opacity .15s,transform .15s;pointer-events:none;
}
#resInfo:not(.hidden){opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
#resInfoInner{
  background:var(--panel);border:1px solid var(--border2);
  padding:12px;box-shadow:0 -4px 20px rgba(0,0,0,.5);
}
</style>
</head>
<body>

<!-- ══ TITLE ══ -->
<div id="sTitle" class="screen">
  <div class="title-grid"></div>
  <div class="title-glow"></div>
  <div style="position:relative;text-align:center">
    <span class="logo-icon">🏭</span>
    <div class="logo">
      <span class="logo-8">8-BIT</span>
      <span class="logo-rest">INDUSTRY</span>
    </div>
    <p class="tagline">START WITH NOTHING · AUTOMATE EVERYTHING · LAUNCH</p>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:320px;margin:0 auto">
      <div id="titleSlots" style="width:100%"></div>
      <button class="btn" onclick="newGame()" style="width:100%">NEW GAME</button>
    </div>
    <p class="v-num">v0.7.5 — ZONE 1: IRONFIELD</p>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="sGame" class="screen hidden">
  <div id="hud">
    <div class="hud-logo">8BI</div>
    <div id="hudZones">
      <div class="zone-tab active" title="Zone 1: Ironfield">Z1</div>
      <div class="zone-tab locked" title="Complete Zone 1 to unlock">Z2</div>
      <div class="zone-tab locked" title="Complete Zone 2 to unlock">Z3</div>
      <div class="zone-tab locked" title="Complete Zone 3 to unlock">Z4</div>
      <div class="zone-tab locked" title="Complete all zones to unlock">Z5</div>
    </div>
    <div id="hudRes"></div>
    <div class="hud-btns">
      <button class="hbtn" id="btnInv"      onclick="togglePanel('inv')">📦</button>
      <button class="hbtn" id="btnResearch" onclick="togglePanel('research')">🔬</button>
      <button class="hbtn" id="btnRocket"   onclick="togglePanel('rocket')">🚀</button>
      <button class="hbtn" id="btnPerks"    onclick="togglePanel('perks')">⭐</button>
      <button class="hbtn" id="btnStats"   onclick="togglePanel('stats')">📊</button>
      <button class="hbtn" id="btnRecipes" onclick="togglePanel('recipes')" title="Recipe Book">📖</button>
      <button class="hbtn" id="btnAchieve" onclick="togglePanel('achieve')">🏆</button>
      <button class="hbtn" id="btnBlueprint" onclick="togglePanel('blueprint')">📐</button>
      <button class="hbtn" id="btnDev" onclick="togglePanel('dev')" style="display:none;border-color:var(--purple);color:var(--purple)">🛠</button>
      <button class="hbtn"                  onclick="openMenu()">☰</button>
    </div>
  </div>
  <div id="wrap"><canvas id="canvas"></canvas>
    <div id="toolTip" class="hidden"></div>
    <div id="multiselBar" class="hidden" style="position:absolute;top:0;left:0;right:0;background:rgba(66,165,245,.15);border-bottom:2px solid #42a5f5;padding:6px 12px;display:flex;align-items:center;gap:8px;z-index:91">
      <span style="font-size:7px;color:#42a5f5;flex:1" id="multiselCount">0 selected</span>
      <button onclick="multiselStartMove()" style="font-family:var(--font);font-size:6px;padding:5px 10px;border:1px solid var(--teal);background:transparent;color:var(--teal);cursor:pointer" id="multiselMoveBtn">✥ MOVE</button>
      <button onclick="multiselRotate()" style="font-family:var(--font);font-size:6px;padding:5px 10px;border:1px solid #42a5f5;background:transparent;color:#42a5f5;cursor:pointer">↻ ROTATE</button>
      <button onclick="multiselDemolish()" style="font-family:var(--font);font-size:6px;padding:5px 10px;border:1px solid var(--red);background:transparent;color:var(--red);cursor:pointer">💥 DEMOLISH</button>
      <button onclick="multiselClear()" style="font-family:var(--font);font-size:6px;padding:5px 10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer">✕ CLEAR</button>
    </div>
    <div id="tutHint" class="hidden" style="position:absolute;bottom:0;left:0;right:0;background:rgba(245,166,35,.12);border-top:1px solid var(--amber);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;z-index:90;pointer-events:all">
      <span id="tutText" style="font-size:5px;color:var(--amber);line-height:1.8"></span>
      <button onclick="skipTutorial()" style="font-family:var(--font);font-size:4px;padding:3px 7px;border:1px solid var(--amberDim);background:transparent;color:var(--text3);cursor:pointer;flex-shrink:0;margin-left:10px">SKIP</button>
    </div>
  </div>
  <div id="toolbar"></div>
</div>

<!-- ══ PANELS ══ -->
<div id="pCraft" class="spanel">
  <div class="ph"><span class="ph-title">🔨 HAND CRAFT</span><button class="ph-x" onclick="togglePanel('craft')">✕</button></div>
  <div class="pbody" id="pCraftBody"></div>
</div>

<div id="pInv" class="spanel">
  <div class="ph"><span class="ph-title">📦 INVENTORY</span><button class="ph-x" onclick="togglePanel('inv')">✕</button></div>
  <div class="pbody" id="pInvBody"></div>
</div>

<div id="pResearch" class="spanel">
  <div class="ph"><span class="ph-title">🔬 RESEARCH</span><button class="ph-x" onclick="togglePanel('research')">✕</button></div>
  <div class="pbody" id="pResBody"></div>
</div>

<div id="pRocket" class="spanel">
  <div class="ph"><span class="ph-title">🚀 ROCKET</span><button class="ph-x" onclick="togglePanel('rocket')">✕</button></div>
  <div class="pbody" id="pRocketBody"></div>
</div>

<div id="pMachine" class="spanel">
  <div class="ph"><span class="ph-title" id="pMachTitle">⚙️ MACHINE</span><button class="ph-x" onclick="togglePanel('machine')">✕</button></div>
  <div class="pbody" id="pMachBody"></div>
</div>

<div id="pDev" class="spanel" style="border-color:var(--purple)">
  <div class="ph" style="border-color:var(--purple)">
    <span class="ph-title" style="color:var(--purple)">🛠 DEV MODE</span>
    <button class="ph-x" onclick="togglePanel('dev')">✕</button>
  </div>
  <div class="pbody" id="pDevBody"></div>
</div>

<div id="pPerks" class="spanel">
  <div class="ph"><span class="ph-title">⭐ PERKS</span><button class="ph-x" onclick="togglePanel('perks')">✕</button></div>
  <div class="pbody" id="pPerksBody"></div>
</div>

<div id="pStats" class="spanel">
  <div class="ph"><span class="ph-title">📊 STATISTICS</span><button class="ph-x" onclick="togglePanel('stats')">✕</button></div>
  <div class="pbody" id="pStatsBody"></div>
</div>

<div id="pAchieve" class="spanel">
  <div class="ph"><span class="ph-title">🏆 ACHIEVEMENTS</span><button class="ph-x" onclick="togglePanel('achieve')">✕</button></div>
  <div class="pbody" id="pAchieveBody"></div>
</div>

<div id="pRecipes" class="spanel">
  <div class="ph"><span class="ph-title">📖 RECIPE BOOK</span><button class="ph-x" onclick="togglePanel('recipes')">✕</button></div>
  <div class="pbody" id="pRecipesBody"></div>

// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const TILE     = 48;
const MAP_W    = 96;
const MAP_H    = 64;
const SAVE_KEY = 'ebi_save';

const D_RIGHT = 0;
const D_DOWN  = 1;
const D_LEFT  = 2;
const D_UP    = 3;

const D_ARR   = ['→','↓','←','↑'];

// ═══════════════════════════════════════════════════
//  SOUND ENGINE  (Web Audio — no files needed)
// ═══════════════════════════════════════════════════
let _ac = null;
function ac() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  return _ac;
}

function sfx(type) {
  if (!G || !G.sfx) return;
  try {
    const ctx = ac();
    const g = ctx.createGain();
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.connect(g);
    const now = ctx.currentTime;
    const cfg = {
      tap:    {f:440, f2:660, t:.06, v:.08, wave:'square'},
      place:  {f:330, f2:440, t:.1,  v:.1,  wave:'square'},
      remove: {f:220, f2:110, t:.12, v:.08, wave:'sawtooth'},
      craft:  {f:523, f2:784, t:.15, v:.1,  wave:'square'},
      research:{f:659,f2:988, t:.2,  v:.1,  wave:'square'},
      launch: {f:220, f2:880, t:.6,  v:.15, wave:'sawtooth'},
      error:  {f:180, f2:120, t:.1,  v:.06, wave:'sawtooth'},
    }[type] || {f:440,f2:440,t:.08,v:.05,wave:'square'};
    o.type = cfg.wave;
    o.frequency.setValueAtTime(cfg.f, now);
    o.frequency.exponentialRampToValueAtTime(cfg.f2, now + cfg.t);
    g.gain.setValueAtTime(cfg.v, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + cfg.t);
    o.start(now); o.stop(now + cfg.t);
  } catch(e) {}
}

// ═══════════════════════════════════════════════════
//  MUSIC ENGINE  (Factory Pulse — 2m10s structured track)
// ═══════════════════════════════════════════════════
let _music={nodes:[],gain:null,running:false,loopId:null};

const _MNOTE=0.3;  // seconds per 16th-note slot
const _MBAR=8*_MNOTE; // 8 slots per bar
const _MEL_VOL=0.022;  // melody volume (softened)
const _BASS_VOL=0.030; // bass volume

// Pentatonic in C across 2 octaves: C3 E3 G3 A3 C4 E4 G4 A4 C5
const _MP=[130.81,164.81,196.00,220.00,261.63,329.63,392.00,440.00,523.25];

const _MSECTIONS=[
  {bars:8,  style:'intro'},
  {bars:16, style:'A'},
  {bars:16, style:'C'},
  {bars:8,  style:'D'},
  {bars:12, style:'E'},
  {bars:16, style:'C'},
  {bars:8,  style:'outro'},
];

const _MPAT={
  intro:[[4,null,null,null,5,null,null,null],[null,null,3,null,null,null,4,null]],
  A:    [[4,null,5,null,4,null,3,null],[4,5,null,3,4,null,5,null]],
  B:    [[4,null,5,null,6,null,5,null],[5,null,4,null,3,null,4,null]],
  C:    [[4,5,4,3,4,5,6,5],[5,4,5,6,5,4,3,4]],
  D:    [[null,null,null,null,null,null,null,null]],
  E:    [[4,null,5,null,4,null,6,null],[5,null,4,null,5,null,3,null]],
  outro:[[4,null,null,null,3,null,null,null],[null,null,2,null,null,null,null,null]],
};
const _MBASS={
  intro:[0,null,null,null,0,null,null,null],
  A:    [0,null,null,null,2,null,null,null],
  B:    [0,null,2,null,0,null,2,null],
  C:    [0,null,2,null,3,null,2,null],
  D:    [0,null,null,0,null,null,0,null],
  E:    [0,null,null,null,2,null,null,null],
  outro:[0,null,null,null,null,null,null,null],
};

function _buildMusicSchedule(){
  const sched=[];
  let t=0;
  for(const sec of _MSECTIONS){
    const pat=_MPAT[sec.style];
    const bass=_MBASS[sec.style];
    const isIntro=sec.style==='intro', isOutro=sec.style==='outro';
    for(let bar=0;bar<sec.bars;bar++){
      const p=pat[bar%pat.length];
      const fadeVol=isIntro?Math.min(1,bar/4):isOutro?Math.max(0.05,1-(bar/sec.bars)):1;
      for(let n=0;n<8;n++){
        const nt=t+n*_MNOTE;
        if(p[n]!==null){
          const v=_MEL_VOL*(sec.style==='C'||sec.style==='E'?1.2:1)*fadeVol;
          sched.push({t:nt,f:_MP[p[n]],d:_MNOTE*0.75,v,w:'square'});
        }
        if(bass[n]!==null&&(!isIntro&&!isOutro||bar>1)){
          sched.push({t:nt,f:_MP[bass[n]]*0.5,d:_MNOTE*1.6,v:_BASS_VOL*fadeVol,w:'triangle'});
        }
        if(sec.style==='C'&&n%2===0){
          sched.push({t:nt,f:880,d:0.04,v:0.01,w:'square'});
        }
      }
      t+=_MBAR;
    }
  }
  return sched;
}

const _MSCHED=_buildMusicSchedule();
const _MTOTAL=_MSCHED.length?_MSCHED[_MSCHED.length-1].t+1:130;

function musicStart(){
  if(_music.running)return;
  try{
    const ctx=ac();
    const mg=ctx.createGain();
    mg.gain.setValueAtTime(G&&G.musicVol!==undefined?G.musicVol:0.7,ctx.currentTime);
    mg.connect(ctx.destination);
    _music.gain=mg;
    _music.running=true;
    _scheduleTrack(ctx.currentTime);
  }catch(e){}
}

function _scheduleTrack(startTime){
  if(!_music.running)return;
  const ctx=ac();
  _music.nodes=[];
  for(const n of _MSCHED){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=n.w;
    o.frequency.setValueAtTime(n.f,startTime+n.t);
    g.gain.setValueAtTime(n.v,startTime+n.t);
    g.gain.exponentialRampToValueAtTime(0.001,startTime+n.t+n.d);
    o.connect(g); g.connect(_music.gain);
    o.start(startTime+n.t);
    o.stop(startTime+n.t+n.d+0.05);
    _music.nodes.push(o);
  }
  // Loop: reschedule just before track ends
  const loopDelay=(_MTOTAL-0.5)*1000;
  _music.loopId=setTimeout(()=>{
    if(_music.running) _scheduleTrack(ac().currentTime+0.1);
  },loopDelay);
}

function musicStop(){
  _music.running=false;
  if(_music.loopId){clearTimeout(_music.loopId);_music.loopId=null;}
  for(const n of _music.nodes){try{n.stop();}catch(e){}}
  _music.nodes=[];
  if(_music.gain){
    try{
      _music.gain.gain.exponentialRampToValueAtTime(0.001,ac().currentTime+0.4);
      setTimeout(()=>{try{_music.gain.disconnect();}catch(e){}},500);
    }catch(e){}
    _music.gain=null;
  }
}

function toggleMusic(){
  G.music=!G.music; saveGame();
  if(G.music) musicStart(); else musicStop();
  openMenu();
}

function setMusicVol(v){
  G.musicVol=parseFloat(v);
  if(_music.gain){
    try{_music.gain.gain.setValueAtTime(G.musicVol,ac().currentTime);}catch(e){}
  }
  saveGame();
  // Update slider display without reopening modal
  const sl=document.getElementById('musicVolSlider');
  if(sl)sl.value=G.musicVol;
  const lbl=document.getElementById('musicVolLabel');
  if(lbl)lbl.textContent=Math.round(G.musicVol*100)+'%';
}
function toggleSfxMenu(){
  G.sfx=!G.sfx; saveGame();
  openMenu();
}

// Visibility change — pause/resume music
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    musicStop();
  } else {
    if(G&&G.music&&_music&&!_music.running) musicStart();
  }
});

function buildMap() {
  const map = [];
  for (let y=0;y<MAP_H;y++){
    map[y]=[];
    for(let x=0;x<MAP_W;x++)
      map[y][x]={type:T_FLOOR,res:null,mid:null,items:[]};
  }
  // Procedural generation: guaranteed deposits near centre, randomised positions each game
  const rng=(seed=>{let s=seed;return()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;}})(Date.now()^0xdeadbeef);
  const ri=(lo,hi)=>lo+Math.floor(rng()*(hi-lo+1));
  const safe=(x,y,w,h)=>{
    for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++){
      const tx=x+dx,ty=y+dy;
      if(tx<2||ty<2||tx+1>=MAP_W||ty+1>=MAP_H)return false;
      if(map[ty][tx].type===T_RESOURCE)return false;
    }
    return true;
  };
  const place=(res,w,h)=>{
    for(let attempt=0;attempt<200;attempt++){
      const x=ri(10,MAP_W-w-10),y=ri(10,MAP_H-h-10);
      if(safe(x,y,w,h)){
        for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)
          map[y+dy][x+dx]={type:T_RESOURCE,res,mid:null,items:[]};
        return true;
      }
    }
    return false;
  };
  // Guaranteed deposits — enough of each type to complete the game
  // Iron: 4 patches (most needed), Copper: 3, Coal: 4 (fuel + propellant), Stone: 3
  const guaranteed=[
    // Iron ore — most critical, 4 large patches
    {res:'iron_ore',   w:ri(6,8), h:ri(5,6)},
    {res:'iron_ore',   w:ri(5,7), h:ri(4,5)},
    {res:'iron_ore',   w:ri(5,6), h:ri(4,5)},
    {res:'iron_ore',   w:ri(4,5), h:ri(3,4)},
    // Copper ore — 3 patches
    {res:'copper_ore', w:ri(5,7), h:ri(4,5)},
    {res:'copper_ore', w:ri(5,6), h:ri(3,5)},
    {res:'copper_ore', w:ri(4,5), h:ri(3,4)},
    // Coal — 4 patches (fuel for burners, furnaces, propellant)
    {res:'coal',       w:ri(5,7), h:ri(4,5)},
    {res:'coal',       w:ri(5,6), h:ri(3,5)},
    {res:'coal',       w:ri(4,5), h:ri(3,4)},
    {res:'coal',       w:ri(3,5), h:ri(3,4)},
    // Stone — 3 patches
    {res:'stone',      w:ri(5,6), h:ri(4,5)},
    {res:'stone',      w:ri(4,5), h:ri(3,4)},
    {res:'stone',      w:ri(3,4), h:ri(3,3)},
  ];
  for(const d of guaranteed) place(d.res,d.w,d.h);
  return map;
}

const MACH_COL={miner:'#f5a623',stone_furnace:'#dd6b20',blast_furnace:'#e53935',electric_smelter:'#ab47bc',assembler:'#42a5f5',lab:'#26c6a0',burner:'#e67e22',generator:'#ffd600',belt:'#555',splitter:'#e67e22',tunnel:'#4a90d9',inserter:'#888',chest:'#7d5a3c'};

// Port layout per machine type:
// Output side per machine type — inserters may NOT deposit into the output side
const PORTS = {
  miner:           { outputs:[{side:'right',pos:.5}] },
  stone_furnace:   { outputs:[{side:'right',pos:.5}] },
  blast_furnace:   { outputs:[{side:'right',pos:.5}] },
  electric_smelter:{ outputs:[{side:'right',pos:.5}] },
  assembler:       { outputs:[{side:'right',pos:.5}] },
  lab:             { outputs:[{side:'right',pos:.5}] },
  generator:       { outputs:[] },
  burner:          { outputs:[] },
  chest:           { outputs:[{side:'bottom',pos:.5}] },
};

function drawPorts(ctx, type, px, py, pw, ph, ts, dir){
  const layout = PORTS[type];
  if(!layout) return;
  const sz = Math.max(4, Math.min(9, ts * .16));

  const SIDES = ['top','right','bottom','left'];
  function rotateSide(side, steps){
    return SIDES[(SIDES.indexOf(side) + steps) % 4];
  }
  const rot = dir || 0;

  // Point on the machine border edge
  function edgeXY(side, pos){
    switch(side){
      case 'top':    return [px + pw*pos, py];
      case 'bottom': return [px + pw*pos, py + ph];
      case 'left':   return [px,          py + ph*pos];
      case 'right':  return [px + pw,     py + ph*pos];
    }
  }

  function arrow(side, pos, isInput){
    const rSide = rotateSide(side, rot);
    const [ex, ey] = edgeXY(rSide, pos);

    // Inward normal (pointing toward machine centre)
    const nx = rSide==='right'?-1 : rSide==='left'?1  : 0;
    const ny = rSide==='bottom'?-1: rSide==='top'?1   : 0;

    // Perpendicular (along the edge)
    const bx = rSide==='top'||rSide==='bottom' ? sz*.6 : 0;
    const by = rSide==='left'||rSide==='right'  ? sz*.6 : 0;

    let tip, baseL, baseR;
    if(isInput){
      // Input: base ON the border, tip points inward sz pixels
      tip   = [ex + nx*sz,  ey + ny*sz];
      baseL = [ex - bx,     ey - by];
      baseR = [ex + bx,     ey + by];
    } else {
      // Output: base inset sz from border, tip points outward to the border
      const bx2 = ex + nx*sz; const by2 = ey + ny*sz; // base centre (inset)
      tip   = [ex,              ey];                   // tip at border
      baseL = [bx2 - bx,       by2 - by];
      baseR = [bx2 + bx,       by2 + by];
    }

    ctx.beginPath();
    ctx.moveTo(tip[0], tip[1]);
    ctx.lineTo(baseL[0], baseL[1]);
    ctx.lineTo(baseR[0], baseR[1]);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)';
    ctx.lineWidth=.8;
    ctx.stroke();
  }

  ctx.fillStyle='rgba(245,166,35,.9)';
  for(const p of layout.outputs) arrow(p.side, p.pos, false);
}

function draw(){
  if(!ctx||!G)return;
  const W=canvas.width,H=canvas.height;
  const {x:cx,y:cy,zoom:z}=G.cam;
  const ts=TILE*z;
  const now=performance.now();
  ctx.fillStyle='#090909';
  ctx.fillRect(0,0,W,H);

  const x0=Math.max(0,Math.floor(cx/ts));
  const y0=Math.max(0,Math.floor(cy/ts));
  const x1=Math.min(MAP_W,Math.ceil((cx+W)/ts));
  const y1=Math.min(MAP_H,Math.ceil((cy+H)/ts));

  // Tiles
  for(let ty=y0;ty<y1;ty++) for(let tx=x0;tx<x1;tx++){
    const px=tx*ts-cx, py=ty*ts-cy;
    const tile=G.map[ty][tx];
    ctx.fillStyle='#111'; ctx.fillRect(px,py,ts,ts);
    ctx.strokeStyle='#161616'; ctx.lineWidth=1; ctx.strokeRect(px,py,ts,ts);

    if(tile.type===T_RESOURCE){
      ctx.fillStyle=RES_COL[tile.res]||'#333';
      ctx.globalAlpha=.6; ctx.fillRect(px+1,py+1,ts-2,ts-2); ctx.globalAlpha=1;
      if(ts>16){
        ctx.font=`${Math.floor(ts*.43)}px serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ITEMS[tile.res]?.icon||'?',px+ts/2,py+ts/2);
      }
    }

    // Mine hover
    if(activeTool==='mine'&&tile.type===T_RESOURCE&&hov.x===tx&&hov.y===ty){
      ctx.fillStyle='rgba(245,166,35,.3)'; ctx.fillRect(px,py,ts,ts);
      ctx.strokeStyle='#f5a623'; ctx.lineWidth=2; ctx.strokeRect(px,py,ts,ts);
    }
    // Mine hold progress ring
    if(mineHold.active&&mineHold.tx===tx&&mineHold.ty===ty&&ts>8){
      const elapsed=now-mineHold.startTime;
      const prog=Math.min(1,elapsed/MINE_HOLD_MS);
      const cx2=px+ts/2, cy2=py+ts/2;
      const rad=Math.max(4,ts*.38);
      const lw=Math.max(2,ts*.08);
      // Background track
      ctx.beginPath(); ctx.arc(cx2,cy2,rad,0,Math.PI*2);
      ctx.strokeStyle='rgba(245,166,35,.18)'; ctx.lineWidth=lw; ctx.stroke();
      // Progress arc
      if(prog>0){
        ctx.beginPath(); ctx.arc(cx2,cy2,rad,-Math.PI/2,-Math.PI/2+Math.PI*2*prog);
        ctx.strokeStyle=`rgba(245,166,35,${.7+.3*prog})`; ctx.lineWidth=lw; ctx.stroke();
      }
      // Pulse the tile highlight as it fills
      ctx.fillStyle=`rgba(245,166,35,${prog*.25})`; ctx.fillRect(px,py,ts,ts);
    }
    // Demolish hover
    if(activeTool==='demolish'&&tile.mid!==null&&hov.x===tx&&hov.y===ty){
      ctx.fillStyle='rgba(229,57,53,.25)'; ctx.fillRect(px,py,ts,ts);
      ctx.strokeStyle='#e53935'; ctx.lineWidth=2; ctx.strokeRect(px,py,ts,ts);
    }

    // Belt tile
    if(tile.mid!==null){
      const m=G.machines[tile.mid];
      if(m&&m.type==='belt'){
        const[dvx,dvy]=D_VEC[m.dir];
        const AMBER='#f5a623';
        const BELT_BG='#252525';
        const RW=Math.max(1.5,ts*.05);
        const inset=RW/2+0.5;

        // Full dark surface
        ctx.fillStyle=BELT_BG; ctx.fillRect(px,py,ts,ts);

        if(ts>10){
          ctx.save();
          ctx.beginPath(); ctx.rect(px,py,ts,ts); ctx.clip();

          // Direction chevrons
          if(ts>14){
            ctx.strokeStyle='rgba(55,55,55,0.9)'; ctx.lineWidth=Math.max(1,ts*.03);
            const sp=ts*.28;
            for(let ci=0;ci<5;ci++){
              const t2=ci*sp-(sp*0.5);
              const bx=px+ts/2+dvx*t2, by=py+ts/2+dvy*t2;
              const ex2=dvy, hw=ts*.22, wing=ts*.08;
              ctx.beginPath();
              ctx.moveTo(bx+ex2*hw-dvx*wing, by+(-dvx)*hw-dvy*wing);
              ctx.lineTo(bx+dvx*wing*1.5,    by+dvy*wing*1.5);
              ctx.lineTo(bx-ex2*hw-dvx*wing, by-(-dvx)*hw-dvy*wing);
              ctx.stroke();
            }
          }

          // Two subtle edge lines (no amber rails)
          ctx.strokeStyle='rgba(70,70,70,0.8)'; ctx.lineWidth=1; ctx.lineCap='square';
          if(dvx!==0){
            ctx.beginPath();ctx.moveTo(px,py+inset);ctx.lineTo(px+ts,py+inset);ctx.stroke();
            ctx.beginPath();ctx.moveTo(px,py+ts-inset);ctx.lineTo(px+ts,py+ts-inset);ctx.stroke();
          } else {
            ctx.beginPath();ctx.moveTo(px+inset,py);ctx.lineTo(px+inset,py+ts);ctx.stroke();
            ctx.beginPath();ctx.moveTo(px+ts-inset,py);ctx.lineTo(px+ts-inset,py+ts);ctx.stroke();
          }
          ctx.restore();
        }

        // Items — prog-based position with sub-tick interpolation
        if(tile.items.length>0){
          const[dvx,dvy]=D_VEC[m.dir];
          const beltSpeed2=(G.research.done.includes('logistics')?.15:.1);
          const subTick=Math.min(1,(now-lastTickMs)/TICK_MS);
          ctx.save();
          ctx.beginPath(); ctx.rect(px+2,py+2,ts-4,ts-4); ctx.clip();
          for(let ii=0;ii<tile.items.length;ii++){
            const it=tile.items[ii];
            const smoothProg=Math.min(0.99, it.prog+beltSpeed2*subTick);
            const travel=(smoothProg-0.5)*ts;
            const ix=px+ts/2+dvx*travel;
            const iy=py+ts/2+dvy*travel;
            ctx.font=`${Math.floor(ts*.32)}px serif`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(ITEMS[it.id]?.icon||'·',ix,iy);
          }
          ctx.restore();
        }
      }
    }
  }

  // Mine hold completion — restart immediately so holding continues mining
  if(mineHold.active&&(now-mineHold.startTime)>=MINE_HOLD_MS){
    tapCollect(mineHold.tx,mineHold.ty);
    mineHold.startTime=now; // restart — keeps mining while held
  }

  // Multi-tile machines
  const drawn=new Set();
  for(const[id,m]of Object.entries(G.machines)){
    if(m.type==='belt'||m.type==='inserter'||m.type==='splitter'||m.type==='tunnel')continue;
    if(drawn.has(+id))continue; drawn.add(+id);
    const def=MDEFS[m.type];
    const[mw,mh]=def.size;
    const px=m.x*ts-cx, py=m.y*ts-cy;
    const pw=mw*ts, ph=mh*ts;
    if(px+pw<0||py+ph<0||px>W||py>H)continue;
    const col=MACH_COL[m.type]||'#666';
    const busy=m.active&&m.recipe&&m.prog>0;
    // Power buildings have their own "running" state — fuelled and active
    const isPowering=(m.type==='generator'||m.type==='burner')&&m.active&&(m.inBuf.coal||0)>0;
    const isStub=def.stub;

    ctx.fillStyle='#141414'; ctx.fillRect(px,py,pw,ph);
    ctx.strokeStyle=busy||isPowering?col:isStub?'#3a2a4a':'#252525';
    ctx.lineWidth=busy||isPowering?2:1; ctx.strokeRect(px+1,py+1,pw-2,ph-2);
    ctx.fillStyle='#0c0c0c'; ctx.fillRect(px+4,py+4,pw-8,ph-8);

    if(busy){
      ctx.fillStyle=col; ctx.globalAlpha=.07+.05*Math.sin(G.tick*.22);
      ctx.fillRect(px+1,py+1,pw-2,ph-2); ctx.globalAlpha=1;
    }
    // Pulsing amber glow for powered generators/burners
    if(isPowering){
      ctx.fillStyle='#ffd600'; ctx.globalAlpha=.06+.04*Math.sin(G.tick*.3);
      ctx.fillRect(px+1,py+1,pw-2,ph-2); ctx.globalAlpha=1;
      // Green pulsing "running" indicator
      if(ts>14){
        ctx.fillStyle='#4caf50'; ctx.globalAlpha=0.8+0.2*Math.sin(G.tick*.4);
        ctx.beginPath(); ctx.arc(px+pw-8,py+ph-8,4,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
      }
    }
    // No-fuel indicator for burners/generators — red dot + dim overlay
    const isPowerBldg=(m.type==='generator'||m.type==='burner');
    if(isPowerBldg&&!isPowering&&m.active){
      ctx.fillStyle='rgba(229,57,53,0.08)'; ctx.fillRect(px+1,py+1,pw-2,ph-2);
      if(ts>14){
        // Blinking red dot — no fuel
        const blink=Math.floor(G.tick/4)%2===0;
        ctx.fillStyle=blink?'#e53935':'#8b0000';
        ctx.beginPath(); ctx.arc(px+pw-8,py+ph-8,4,0,Math.PI*2); ctx.fill();
        // "No fuel" label at high zoom
        if(ts>28){
          ctx.fillStyle='#e53935'; ctx.globalAlpha=0.9;
          ctx.font=`${Math.max(7,Math.floor(ts*.11))}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('NO COAL',px+pw/2,py+ph*.8);
          ctx.globalAlpha=1;
        }
      }
    }
    if(isPowerBldg&&!m.active){
      ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(px+1,py+1,pw-2,ph-2);
    }
    if(isStub){
      ctx.fillStyle='#ab47bc'; ctx.globalAlpha=.04; ctx.fillRect(px+1,py+1,pw-2,ph-2); ctx.globalAlpha=1;
    }

    if(ts>10){
      const fs=Math.floor(Math.min(pw,ph)*.35);
      ctx.font=`${fs}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      // For assembler with recipe: push main icon up, recipe icon down
      const hasRecipe=m.recipe&&(m.type==='assembler'||m.type==='lab')&&ts>24;
      const oy=hasRecipe?-ph*.2:(ph>ts*.9?-5*z:0);
      ctx.fillText(def.icon,px+pw/2,py+ph/2+oy);
      // Recipe output icon stacked below main icon
      if(hasRecipe){
        const rec=RECIPES[m.recipe];
        const outIcon=rec?ITEMS[Object.keys(rec.out)[0]]?.icon:null;
        if(outIcon){
          ctx.font=`${Math.floor(Math.min(pw,ph)*.22)}px serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(outIcon,px+pw/2,py+ph*.7);
        }
      }
    }
    if(m.recipe&&m.active&&ph>ts*.85){
      const rec=RECIPES[m.recipe];
      const pct=rec?Math.min(1,m.prog/rec.time):0;
      ctx.save();
      ctx.beginPath(); ctx.rect(px+4,py+ph-12,pw-8,7); ctx.clip();
      ctx.fillStyle='#0a0a0a'; ctx.fillRect(px+4,py+ph-12,pw-8,7);
      ctx.fillStyle=col; ctx.globalAlpha=.9; ctx.fillRect(px+4,py+ph-12,(pw-8)*pct,7); ctx.globalAlpha=1;
      ctx.restore();
    }
    // No-recipe warning dot
    if(m.active&&def.recipes.length>0&&!m.recipe){
      ctx.fillStyle='#f5a623'; ctx.beginPath(); ctx.arc(px+pw-8,py+8,4,0,Math.PI*2); ctx.fill();
    }
    // Output buffer fill indicator
    if(ts>20){
      const bufTotal=Object.values(m.outBuf).reduce((a,b)=>a+b,0);
      if(bufTotal>0){
        const full=bufTotal>=50;
        ctx.fillStyle=full?'#e53935':'#f5a623';
        ctx.globalAlpha=full?1:.8;
        ctx.fillRect(px+4,py+4,Math.min(pw-8,(pw-8)*bufTotal/50),4);
        ctx.globalAlpha=1;
      }
    }
    // Chest: show fill level with bar + count
    if(m.type==='chest'){
      const total=Object.values(m.chestInv).reduce((a,b)=>a+b,0);
      const CAP=200;
      const pct=Math.min(1,total/CAP);
      if(ts>14){
        // Background track
        ctx.fillStyle='#111'; ctx.fillRect(px+4,py+ph-11,pw-8,6);
        // Fill bar — green→amber→red
        const barCol=pct>.8?'#e53935':pct>.5?'#f5a623':'#26c6a0';
        ctx.fillStyle=barCol; ctx.globalAlpha=.9;
        ctx.fillRect(px+4,py+ph-11,Math.max(0,(pw-8)*pct),6);
        ctx.globalAlpha=1;
        // Item count at high zoom
        if(ts>26&&total>0){
          ctx.fillStyle=pct>.8?'#ff8a80':'#ccc';
          ctx.font=`${Math.max(7,Math.floor(ts*.14))}px sans-serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(`${total}/${CAP}`,px+pw/2,py+ph-14);
        }
      }
    }
    // Tier badge (T2 = amber, T3 = teal) — top-left corner
    if((m.tier||1)>1&&ts>16){
      const tierCol=(m.tier||1)>=3?'#26c6a0':'#f5a623';
      ctx.fillStyle=tierCol;
      ctx.beginPath(); ctx.arc(px+7,py+7,4,0,Math.PI*2); ctx.fill();
      if(ts>24){
        ctx.fillStyle='#000'; ctx.font=`${Math.floor(ts*.13)}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('T'+(m.tier||1),px+7,py+7);
      }
    }
    // Input / output port arrows (only at reasonable zoom)
    if(ts>28) drawPorts(ctx,m.type,px,py,pw,ph,ts,m.dir);
  }

  // Inserters — drawn as animated arm
  for(const[id,m]of Object.entries(G.machines)){
    if(m.type!=='inserter')continue;
    const px=m.x*ts-cx, py=m.y*ts-cy;
    if(px+ts<0||py+ts<0||px>W||py>H)continue;

    // Base tile
    ctx.fillStyle='#141414'; ctx.fillRect(px,py,ts,ts);
    ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(px+2,py+2,ts-4,ts-4);

    // Base circle
    const bcx=px+ts/2, bcy=py+ts/2, brad=Math.max(2,ts*.12);
    ctx.fillStyle='#666';
    ctx.beginPath(); ctx.arc(bcx,bcy,brad,0,Math.PI*2); ctx.fill();

    // Arm — smooth semicircle sweep using real time
    const swingDurMs=4*TICK_MS;
    const msSince=now-(m.lastTransferMs||0);
    const swingT=msSince<swingDurMs?(1-msSince/swingDurMs):0;
    const[dvx,dvy]=D_VEC[m.dir];
    const destAngle=Math.atan2(dvy,dvx);
    const srcAngle=destAngle+Math.PI;
    const isHolding=m._pending&&m._pending.length>0;
    let armAngle;
    if(isHolding&&swingT<=0.05){
      // Holding item, waiting — park arm at destination side
      armAngle=destAngle;
    } else {
      const sweep=Math.sin(swingT*Math.PI);
      armAngle=srcAngle - sweep*Math.PI;
    }
    const armLen=Math.max(4,ts*.40);
    const ax=bcx+Math.cos(armAngle)*armLen;
    const ay=bcy+Math.sin(armAngle)*armLen;
    const isMoving=swingT>0.05;
    ctx.strokeStyle=isMoving?'#f5a623':isHolding?'#f5a623':'#777';
    ctx.lineWidth=Math.max(1.5,ts*.07);
    ctx.beginPath(); ctx.moveTo(bcx,bcy); ctx.lineTo(ax,ay); ctx.stroke();
    const clawR=Math.max(2,ts*.10);
    ctx.fillStyle=isMoving||isHolding?'#f5a623':'#999';
    ctx.beginPath(); ctx.arc(ax,ay,clawR,0,Math.PI*2); ctx.fill();

    // Show carried item on arm tip
    if(m._pending&&m._pending.length>0&&ts>18){
      ctx.font=`${Math.floor(ts*.22)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(ITEMS[m._pending[0].item]?.icon||'·',ax,ay);
    }

    // Direction label at high zoom
    if(ts>32){
      ctx.fillStyle='rgba(136,136,136,.5)'; ctx.font=`${Math.floor(ts*.22)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(D_ARR[m.dir],px+ts/2,py+ts*.82);
    }
  }

  // Splitters
  for(const[id,m]of Object.entries(G.machines)){
    if(m.type!=='splitter')continue;
    const px=m.x*ts-cx, py=m.y*ts-cy;
    if(px+ts<0||py+ts<0||px>W||py>H)continue;
    ctx.fillStyle='#141414'; ctx.fillRect(px,py,ts,ts);
    ctx.strokeStyle=MACH_COL.splitter; ctx.lineWidth=1.5; ctx.strokeRect(px+2,py+2,ts-4,ts-4);
    if(ts>14){
      ctx.fillStyle=MACH_COL.splitter; ctx.font=`${Math.floor(ts*.38)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⑂',px+ts/2,py+ts/2);
    }
    // Draw Y-split arrows
    if(ts>20){
      const[dvx,dvy]=D_VEC[m.dir];
      ctx.strokeStyle=MACH_COL.splitter; ctx.lineWidth=1; ctx.globalAlpha=.6;
      // Forward arrow
      ctx.beginPath(); ctx.moveTo(px+ts/2,py+ts/2); ctx.lineTo(px+ts/2+dvx*ts*.3,py+ts/2+dvy*ts*.3); ctx.stroke();
      // Left branch
      ctx.beginPath(); ctx.moveTo(px+ts/2,py+ts/2); ctx.lineTo(px+ts/2+dvy*ts*.25,py+ts/2-dvx*ts*.25); ctx.stroke();
      // Right branch
      ctx.beginPath(); ctx.moveTo(px+ts/2,py+ts/2); ctx.lineTo(px+ts/2-dvy*ts*.25,py+ts/2+dvx*ts*.25); ctx.stroke();
      ctx.globalAlpha=1;
    }
  }

  // Belt tunnels
  for(const[id,m]of Object.entries(G.machines)){
    if(m.type!=='tunnel')continue;
    const px=m.x*ts-cx, py=m.y*ts-cy;
    if(px+ts<0||py+ts<0||px>W||py>H)continue;
    const linked=m.tunnelId!==null;
    ctx.fillStyle='#0a0a14'; ctx.fillRect(px,py,ts,ts);
    ctx.strokeStyle=linked?MACH_COL.tunnel:'#444'; ctx.lineWidth=1.5; ctx.strokeRect(px+2,py+2,ts-4,ts-4);
    // Portal circle
    ctx.fillStyle=linked?'rgba(74,144,217,.4)':'rgba(100,100,100,.2)';
    ctx.beginPath(); ctx.arc(px+ts/2,py+ts/2,ts*.3,0,Math.PI*2); ctx.fill();
    if(linked){
      ctx.strokeStyle=MACH_COL.tunnel; ctx.lineWidth=1; ctx.globalAlpha=.8;
      ctx.beginPath(); ctx.arc(px+ts/2,py+ts/2,ts*.3,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }
    if(ts>14){
      ctx.fillStyle=linked?MACH_COL.tunnel:'#555'; ctx.font=`${Math.floor(ts*.28)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(D_ARR[m.dir],px+ts/2,py+ts/2);
    }
  }

  // Placement preview
  if(activeTool==='move'&&moveState.active&&hov.x>=0){
    const m=G.machines[moveState.machineId];
    if(m){
      const def=MDEFS[m.type]; const[mw,mh]=def.size;
      const px=hov.x*ts-cx, py=hov.y*ts-cy;
      const ok=canPlace(m.type,hov.x,hov.y);
      ctx.fillStyle=ok?'rgba(245,166,35,.14)':'rgba(229,57,53,.14)';
      ctx.fillRect(px,py,mw*ts,mh*ts);
      ctx.strokeStyle=ok?'#f5a623':'#e53935';
      ctx.lineWidth=2; ctx.setLineDash([4,4]); ctx.strokeRect(px,py,mw*ts,mh*ts); ctx.setLineDash([]);
      if(ts>10){
        ctx.font=`${Math.floor(Math.min(mw,mh)*ts*.35)}px serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.globalAlpha=.5; ctx.fillText(def.icon,px+mw*ts/2,py+mh*ts/2); ctx.globalAlpha=1;
      }
    }
  } else if(activeTool!=='select'&&activeTool!=='demolish'&&activeTool!=='move'&&hov.x>=0){
    const def=MDEFS[activeTool];
    if(def){
      const[mw,mh]=def.size;
      const px=hov.x*ts-cx, py=hov.y*ts-cy;
      const ok=canPlace(activeTool,hov.x,hov.y);
      ctx.fillStyle=ok?'rgba(245,166,35,.14)':'rgba(229,57,53,.14)';
      ctx.fillRect(px,py,mw*ts,mh*ts);
      ctx.strokeStyle=ok?'#f5a623':'#e53935';
      ctx.lineWidth=2; ctx.strokeRect(px,py,mw*ts,mh*ts);
    }
  }

  // Multi-select selection box
  if(activeTool==='multisel'){
    const ms=multiselState;
    if(ms.mode==='selecting'&&hov.x>=0){
      const px1=Math.min(ms.x1,hov.x)*ts-cx, py1=Math.min(ms.y1,hov.y)*ts-cy;
      const pw=(Math.abs(hov.x-ms.x1)+1)*ts, ph=(Math.abs(hov.y-ms.y1)+1)*ts;
      ctx.fillStyle='rgba(66,165,245,.1)'; ctx.fillRect(px1,py1,pw,ph);
      ctx.strokeStyle='#42a5f5'; ctx.lineWidth=2; ctx.setLineDash([4,4]); ctx.strokeRect(px1,py1,pw,ph); ctx.setLineDash([]);
    } else if(ms.mode==='selected'||ms.mode==='moving'){
      // Highlight selected machines
      for(const id of ms.ids){
        const m=G.machines[id]; if(!m)continue;
        const def=MDEFS[m.type]; const[mw,mh]=def.size;
        const px=m.x*ts-cx, py=m.y*ts-cy;
        ctx.fillStyle='rgba(66,165,245,.15)'; ctx.fillRect(px,py,mw*ts,mh*ts);
        ctx.strokeStyle='#42a5f5'; ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.strokeRect(px,py,mw*ts,mh*ts); ctx.setLineDash([]);
      }
      // Ghost preview for move destination
      if(ms.mode==='moving'&&hov.x>=0){
        const dx=hov.x-ms.anchorX, dy=hov.y-ms.anchorY;
        for(const id of ms.ids){
          const m=G.machines[id]; if(!m)continue;
          const def=MDEFS[m.type]; const[mw,mh]=def.size;
          const px=(m.x+dx)*ts-cx, py=(m.y+dy)*ts-cy;
          ctx.fillStyle='rgba(38,198,160,.12)'; ctx.fillRect(px,py,mw*ts,mh*ts);
          ctx.strokeStyle='#26c6a0'; ctx.lineWidth=1.5; ctx.setLineDash([4,4]); ctx.strokeRect(px,py,mw*ts,mh*ts); ctx.setLineDash([]);
          if(ts>12){
            ctx.font=`${Math.floor(Math.min(mw,mh)*ts*.35)}px serif`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.globalAlpha=.4; ctx.fillText(def.icon,px+mw*ts/2,py+mh*ts/2); ctx.globalAlpha=1;
          }
        }
      }
    }
  }
  // Blueprint selection / paste preview
  if(activeTool==='blueprint'){
    const bp=blueprintState;
    if(bp.mode==='selecting'){
      const px1=Math.min(bp.x1,hov.x)*ts-cx, py1=Math.min(bp.y1,hov.y)*ts-cy;
      const pw=(Math.abs(hov.x-bp.x1)+1)*ts, ph=(Math.abs(hov.y-bp.y1)+1)*ts;
      ctx.fillStyle='rgba(38,198,160,.1)'; ctx.fillRect(px1,py1,pw,ph);
      ctx.strokeStyle='#26c6a0'; ctx.lineWidth=2; ctx.setLineDash([4,4]); ctx.strokeRect(px1,py1,pw,ph); ctx.setLineDash([]);
    } else if(bp.mode==='holding'&&hov.x>=0){
      for(const e of bp.data){
        const def=MDEFS[e.type]; if(!def)continue;
        const[mw,mh]=def.size;
        const px=( hov.x+e.rx)*ts-cx, py=(hov.y+e.ry)*ts-cy;
        ctx.fillStyle='rgba(38,198,160,.12)'; ctx.fillRect(px,py,mw*ts,mh*ts);
        ctx.strokeStyle='#26c6a0'; ctx.lineWidth=1; ctx.setLineDash([3,3]); ctx.strokeRect(px,py,mw*ts,mh*ts); ctx.setLineDash([]);
        if(ts>14){
          ctx.font=`${Math.floor(Math.min(mw,mh)*ts*.35)}px serif`;
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.globalAlpha=.5; ctx.fillText(def.icon,px+mw*ts/2,py+mh*ts/2); ctx.globalAlpha=1;
        }
      }
    }
  }

  // Tap ripples
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i]; const age=(now-r.t)/380;
    if(age>1){ripples.splice(i,1);continue;}
    ctx.beginPath(); ctx.arc(r.px,r.py,Math.max(0,age*30),0,Math.PI*2);
    ctx.strokeStyle=`rgba(245,166,35,${(1-age)*.8})`; ctx.lineWidth=1.5; ctx.stroke();
  }
}

const ripples=[];

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
let activeTool='select';
let placeDir=D_RIGHT;
let hov={x:-1,y:-1};
let drag={on:false,sx:0,sy:0,cx:0,cy:0,moved:false};
let pinch={on:false,d:0};
let touchT=0;
const MINE_HOLD_MS=2000;
let mineHold={active:false,tx:0,ty:0,startTime:0};
let moveState={active:false,machineId:null,origX:0,origY:0};
// Blueprint tool state
let blueprintState={mode:'idle',x1:0,y1:0,x2:0,y2:0,data:[]};
let multiselState={mode:'idle',x1:0,y1:0,x2:0,y2:0,ids:[]};

function wrapRect(){return document.getElementById('wrap').getBoundingClientRect()}
function scrToTile(sx,sy){const ts=TILE*G.cam.zoom;return{x:Math.floor((sx+G.cam.x)/ts),y:Math.floor((sy+G.cam.y)/ts)}}

function zoomAt(sx,sy,f){
  const oz=G.cam.zoom; G.cam.zoom=Math.max(.25,Math.min(4,oz*f));
  const wx=(sx+G.cam.x)/oz, wy=(sy+G.cam.y)/oz;
  G.cam.x=wx*G.cam.zoom-sx; G.cam.y=wy*G.cam.zoom-sy; clampCam();
}
function clampCam(){
  const ts=TILE*G.cam.zoom;
  const mx=MAP_W*ts-canvas.width, my=MAP_H*ts-canvas.height;
  G.cam.x=Math.max(0,Math.min(mx||0,G.cam.x));
  G.cam.y=Math.max(0,Math.min(my||0,G.cam.y));
}

function setupInput(){
  const el=document.getElementById('wrap');
  let lastTouch=0;
  const isTouch=()=>Date.now()-lastTouch<500;

  el.addEventListener('mousedown', e=>{if(!isTouch())onDown(e.clientX,e.clientY);});
  el.addEventListener('mousemove', e=>{if(!isTouch())onMov(e.clientX,e.clientY);});
  el.addEventListener('mouseup',   e=>{if(!isTouch())onUp(e.clientX,e.clientY);});
  el.addEventListener('wheel',     e=>{e.preventDefault();const r=wrapRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY>0?.88:1.14);},{passive:false});
  el.addEventListener('touchstart',e=>{e.preventDefault();lastTouch=Date.now();onTouchStart(e);},{passive:false});
  el.addEventListener('touchmove', e=>{e.preventDefault();lastTouch=Date.now();onTouchMove(e); },{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();lastTouch=Date.now();onTouchEnd(e);  },{passive:false});
  document.addEventListener('contextmenu',e=>e.preventDefault());
}

function onDown(cx,cy){
  drag={on:true,sx:cx,sy:cy,cx:G.cam.x,cy:G.cam.y,moved:false};
  closeResInfo();
  if(activeTool==='mine'){
    const r=wrapRect(); const tile=scrToTile(cx-r.left,cy-r.top);
    if(tile.x>=0&&tile.y>=0&&tile.x<MAP_W&&tile.y<MAP_H&&G.map[tile.y][tile.x].type===T_RESOURCE)
      mineHold={active:true,tx:tile.x,ty:tile.y,startTime:performance.now()};
  }
}
function onMov(cx,cy){
  const r=wrapRect(); hov=scrToTile(cx-r.left,cy-r.top);
  if(!drag.on)return;
  const dx=cx-drag.sx,dy=cy-drag.sy;
  if(Math.abs(dx)>8||Math.abs(dy)>8){drag.moved=true;}
  G.cam.x=drag.cx-dx; G.cam.y=drag.cy-dy; clampCam();
}
function onUp(cx,cy){
  if(!drag.on)return; drag.on=false;
  mineHold.active=false;
  if(!drag.moved){const r=wrapRect();handleTap(scrToTile(cx-r.left,cy-r.top),false);}
}

function tdist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
function onTouchStart(e){
  touchT=Date.now();
  if(e.touches.length===1){
    const t=e.touches[0];
    drag={on:true,sx:t.clientX,sy:t.clientY,cx:G.cam.x,cy:G.cam.y,moved:false};
    pinch.on=false;
    if(activeTool==='mine'){
      const r=wrapRect(); const tile=scrToTile(t.clientX-r.left,t.clientY-r.top);
      if(tile.x>=0&&tile.y>=0&&tile.x<MAP_W&&tile.y<MAP_H&&G.map[tile.y][tile.x].type===T_RESOURCE)
        mineHold={active:true,tx:tile.x,ty:tile.y,startTime:performance.now()};
    }
  }
  else if(e.touches.length===2){drag.on=false;mineHold.active=false;pinch={on:true,d:tdist(e.touches)};}
}
function onTouchMove(e){
  if(e.touches.length===1&&drag.on){
    const t=e.touches[0]; const dx=t.clientX-drag.sx,dy=t.clientY-drag.sy;
    if(Math.abs(dx)>8||Math.abs(dy)>8){drag.moved=true;}
    G.cam.x=drag.cx-dx; G.cam.y=drag.cy-dy; clampCam();
    const r=wrapRect(); hov=scrToTile(t.clientX-r.left,t.clientY-r.top);
  } else if(e.touches.length===2&&pinch.on){
    const nd=tdist(e.touches); const r=wrapRect();
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top;
    zoomAt(mx,my,nd/pinch.d); pinch.d=nd; drag.moved=true;
  }
}
function onTouchEnd(e){
  mineHold.active=false;
  if(e.changedTouches.length===1&&!drag.moved){
    const t=e.changedTouches[0]; const r=wrapRect();
    handleTap(scrToTile(t.clientX-r.left,t.clientY-r.top),Date.now()-touchT>400);
  }
  drag.on=false; pinch.on=false;
}

// ═══════════════════════════════════════════════════
//  TAP HANDLER
// ═══════════════════════════════════════════════════
function handleTap(tile,isLong){
  const{x,y}=tile;
  if(x<0||y<0||x>=MAP_W||y>=MAP_H)return;
  const t=G.map[y][x];

  if(activeTool==='demolish'||isLong){
    if(t.mid!==null)tryRemove(x,y);
    return;
  }
  if(activeTool==='mine'){
    // Mining is hold-to-collect — handled by mineHold in draw()
    return;
  }
  if(activeTool==='rotate'){
    if(t.mid!==null){
      const m=G.machines[t.mid];
      if(m){
        m.dir=(m.dir+1)%4;
        sfx('place');
        toast(`${MDEFS[m.type]?.name} → ${D_ARR[m.dir]}`,'ok');
        if(openPanel==='machine'&&inspectId===m.id)renderMachPanel();
      }
    } else {
      toast('Tap a machine to rotate it','wrn');
    }
    return;
  }
  if(activeTool==='select'){
    if(t.mid!==null){openMachinePanel(G.machines[t.mid]);return;}
    if(t.type===T_RESOURCE){openResInfo(t.res,x,y);return;}
    return;
  }
  if(activeTool==='move'){
    if(!moveState.active){
      // First tap — pick up machine
      if(t.mid===null){toast('Tap a machine to pick it up','wrn');return;}
      const m=G.machines[t.mid];
      if(!m)return;
      // Store original position for restore on cancel
      moveState={active:true,machineId:m.id,origX:m.x,origY:m.y};
      // Clear its map tiles so canPlace works correctly on destination
      const def=MDEFS[m.type]; const[mw,mh]=def.size;
      for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++)
        G.map[m.y+dy][m.x+dx].mid=null;
      toast(`${def.name} picked up — tap to place`,'ok'); sfx('place');
      if(openPanel==='machine')closePanel('machine');
    } else {
      // Second tap — place at new location
      const m=G.machines[moveState.machineId];
      if(!m){moveState={active:false,machineId:null,origX:0,origY:0};return;}
      const def=MDEFS[m.type];
      const[mw,mh]=def.size;

      if(!canPlace(m.type,x,y)){
        // Can't place here — keep machine held, let player try another spot
        toast('Cannot place here','bad'); sfx('error'); return;
      }

      // Place at new location
      m.x=x; m.y=y;
      if(m.type==='miner')m.mineRes=G.map[y][x].res||null;
      for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++)
        G.map[y+dy][x+dx].mid=m.id;
      moveState={active:false,machineId:null,origX:0,origY:0};
      saveGame(); sfx('place');
      toast(`${def.name} moved`,'ok');
    }
    return;
  }
  if(activeTool==='multisel'){
    const ms=multiselState;
    if(ms.mode==='idle'){
      ms.x1=x; ms.y1=y; ms.x2=x; ms.y2=y; ms.mode='selecting';
      toast('Tap second corner to select area','ok');
    } else if(ms.mode==='selecting'){
      ms.x2=x; ms.y2=y;
      const minX=Math.min(ms.x1,ms.x2),maxX=Math.max(ms.x1,ms.x2);
      const minY=Math.min(ms.y1,ms.y2),maxY=Math.max(ms.y1,ms.y2);
      const ids=new Set();
      for(let ty=minY;ty<=maxY;ty++) for(let tx=minX;tx<=maxX;tx++){
        const mid=G.map[ty][tx].mid;
        if(mid!==null) ids.add(mid);
      }
      ms.ids=[...ids]; ms.mode='selected';
      if(!ms.ids.length){toast('No machines in selection','wrn');ms.mode='idle';return;}
      toast(`${ms.ids.length} machine${ms.ids.length>1?'s':''} selected`,'ok');
      const bar=document.getElementById('multiselBar');
      const cnt=document.getElementById('multiselCount');
      if(bar){bar.classList.remove('hidden');}
      if(cnt){cnt.textContent=ms.ids.length+' machine'+(ms.ids.length>1?'s':'')+' selected';}
    } else if(ms.mode==='moving'){
      const dx=x-ms.anchorX, dy=y-ms.anchorY;
      if(dx===0&&dy===0){ms.mode='selected';return;}
      const movingSet=new Set(ms.ids);
      const canMove=ms.ids.every(id=>{
        const m=G.machines[id]; if(!m)return true;
        const def=MDEFS[m.type]; const[mw,mh]=def.size;
        for(let ty2=0;ty2<mh;ty2++) for(let tx2=0;tx2<mw;tx2++){
          const nx=m.x+dx+tx2, ny=m.y+dy+ty2;
          if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H)return false;
          const occ=G.map[ny][nx].mid;
          if(occ!==null&&!movingSet.has(occ))return false;
        }
        return true;
      });
      if(!canMove){toast('Cannot place here — tiles occupied','bad');sfx('error');return;}
      for(const id of ms.ids){
        const m=G.machines[id]; if(!m)continue;
        const def=MDEFS[m.type]; const[mw,mh]=def.size;
        for(let ty2=0;ty2<mh;ty2++) for(let tx2=0;tx2<mw;tx2++)
          G.map[m.y+ty2][m.x+tx2].mid=null;
      }
      for(const id of ms.ids){
        const m=G.machines[id]; if(!m)continue;
        m.x+=dx; m.y+=dy;
        if(m.type==='miner')m.mineRes=G.map[m.y][m.x].res||null;
        const def=MDEFS[m.type]; const[mw,mh]=def.size;
        for(let ty2=0;ty2<mh;ty2++) for(let tx2=0;tx2<mw;tx2++)
          G.map[m.y+ty2][m.x+tx2].mid=m.id;
      }
      ms.mode='selected';
      const btn=document.getElementById('multiselMoveBtn');
      if(btn){btn.style.background='transparent';btn.textContent='✥ MOVE';}
      saveGame(); sfx('place');
      toast(`Moved ${ms.ids.length} machine${ms.ids.length>1?'s':''}`, 'ok');
    }
    return;
  }
  if(activeTool==='blueprint'){
    const bp=blueprintState;
    if(bp.mode==='idle'){
      // First tap — set selection start
      bp.x1=x; bp.y1=y; bp.x2=x; bp.y2=y; bp.mode='selecting';
      toast('Tap second corner to capture area','ok');
    } else if(bp.mode==='selecting'){
      // Second tap — capture region then prompt to save
      bp.x2=x; bp.y2=y;
      const minX=Math.min(bp.x1,bp.x2), maxX=Math.max(bp.x1,bp.x2);
      const minY=Math.min(bp.y1,bp.y2), maxY=Math.max(bp.y1,bp.y2);
      const captured=[];
      const seen=new Set();
      for(let ty=minY;ty<=maxY;ty++) for(let tx=minX;tx<=maxX;tx++){
        const mid=G.map[ty][tx].mid;
        if(mid===null||seen.has(mid))continue;
        seen.add(mid);
        const m=G.machines[mid];
        captured.push({type:m.type,rx:m.x-minX,ry:m.y-minY,dir:m.dir,recipe:m.recipe,tier:m.tier||1});
      }
      if(!captured.length){toast('No machines in selection','wrn');bp.mode='idle';return;}
      bp.data=captured; bp.mode='idle';
      // Show save dialog with cost summary
      const defaultName=`Blueprint ${(G.blueprints||[]).length+1}`;
      showModal('💾 SAVE BLUEPRINT',
        `<div style="font-size:6px;color:var(--text2);margin-bottom:8px">${captured.length} machine${captured.length!==1?'s':''} captured.</div>
         <input id="bpNameInput" type="text" value="${defaultName}" maxlength="24" style="width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:6px;padding:8px;margin-bottom:10px">
         <div style="font-size:5px;color:var(--text3);line-height:1.9">Material cost per paste:<br><span style="color:var(--amber)">${blueprintCostStr(captured)}</span></div>`,
        `<button class="btn btn-teal btn-sm" onclick="saveBlueprintFromModal()">SAVE</button>
         <button class="btn btn-sm" onclick="closeModal();blueprintState.data=[]">DISCARD</button>`
      );
      setTimeout(()=>{const i=document.getElementById('bpNameInput');if(i){i.focus();i.select();}},100);
    } else if(bp.mode==='holding'){
      // Tap to place blueprint at this location — deducts materials
      pasteBlueprintAt(bp.data, x, y);
    }
    return;
  }
  tryPlace(activeTool,x,y);
}

function tapCollect(x,y){

  G.inv[tile.res]=(G.inv[tile.res]||0)+1;

}

function openResInfo(resId){
