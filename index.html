// ═══════════════════════════════════════════════════
//  PLACEMENT
// ═══════════════════════════════════════════════════
function canPlace(type,tx,ty){
  if(!MDEFS[type])return false;
  const[mw,mh]=MDEFS[type].size;
  for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++){
    const nx=tx+dx,ny=ty+dy;
    if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H)return false;
    if(G.map[ny][nx].mid!==null)return false;
    if(type==='miner'&&G.map[ny][nx].type!==T_RESOURCE)return false;
    if(type!=='miner'&&type!=='belt'&&type!=='inserter'&&type!=='chest'&&type!=='splitter'&&type!=='tunnel'&&G.map[ny][nx].type===T_RESOURCE)return false;
  }
  return true;
}

function tryPlace(type,tx,ty){
  const def=MDEFS[type]; if(!def)return;
  if(def.stub){toast(`[FUTURE] ${def.name} — not yet active`,'wrn');return;}
  if(def.unlock&&!G.research.done.includes(def.unlock)){
    toast(`Requires: ${TECHS[def.unlock]?.name||def.unlock}`,'wrn'); sfx('error'); return;
  }
  if(!canPlace(type,tx,ty)){toast('Cannot place here','bad'); sfx('error'); return;}

  // Power warning — confirm if this machine will exceed available power
  if(def.power>0&&!G.devFreeBuild){
    const pwrFree=G.power.out-G.power.in;
    if(def.power>pwrFree&&G.power.out>0){
      const free=Math.max(0,Math.round(pwrFree));
      showModal('⚡ POWER WARNING',
        `<div style="font-size:7px;color:var(--amber);margin-bottom:10px">Not enough power!</div>
         <div style="font-size:6px;color:var(--text2);line-height:2.2">
           ${def.name} needs <span style="color:var(--amber)">${def.power}kW</span><br>
           Available: <span style="color:${free>0?'var(--green)':'var(--red)'}">${free}kW free</span><br>
           <span style="color:var(--text3)">Machines will slow or stop until you add more power.</span>
         </div>`,
        `<button class="btn btn-sm" onclick="closeModal();completePlacement('${type}',${tx},${ty})">PLACE ANYWAY</button>
         <button class="btn btn-sm btn-red" onclick="closeModal()">CANCEL</button>`
      );
      return; // defer — completePlacement will finish if confirmed
    }
  }

  // Check crafted pool first, then materials (skip cost if dev free build)
  const crafted=(G.crafted[type]||0)>0;
  if(G.devFreeBuild){
    // free placement — no cost deducted
  } else if(crafted){
    G.crafted[type]--;
  } else {
    for(const[item,need]of Object.entries(def.cost)){
      if((G.inv[item]||0)<need){toast(`Need ${need}× ${ITEMS[item]?.name||item}`,'wrn'); sfx('error'); return;}
    }
    for(const[item,need]of Object.entries(def.cost)) G.inv[item]-=need;
  }

  const m=mkMachine(type,tx,ty,placeDir);
  if(type==='miner')m.mineRes=G.map[ty][tx].res;
  // Link tunnel to nearest unpaired tunnel in same direction within 5 tiles
  if(type==='tunnel'){
    const[dvx,dvy]=D_VEC[placeDir];
    for(let dist=1;dist<=5;dist++){
      const lx=tx-dvx*dist, ly=ty-dvy*dist;
      if(lx<0||ly<0||lx>=MAP_W||ly>=MAP_H)break;
      const ltile=G.map[ly][lx];
      if(ltile.mid===null)continue;
      const lm=G.machines[ltile.mid];
      if(lm&&lm.type==='tunnel'&&lm.tunnelId===null&&lm.dir===placeDir){
        m.tunnelId=lm.id; lm.tunnelId=m.id;
        toast(`Tunnel linked! (${dist} tiles)`,'ok');
        break;
      }
    }
  }
  G.machines[m.id]=m;

  const[mw,mh]=def.size;
  for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++)
    G.map[ty+dy][tx+dx].mid=m.id;

  G.stats.placed++; updateHUD(); saveGame(); sfx('place');
  toast(`Placed ${def.name}`,'ok');
  document.getElementById('toolTip').classList.add('hidden');
}

function completePlacement(type,tx,ty){
  // Called after player confirms power warning — skip power check and place
  const def=MDEFS[type]; if(!def)return;
  if(!canPlace(type,tx,ty)){toast('Cannot place here','bad');sfx('error');return;}
  const crafted=(G.crafted[type]||0)>0;
  if(G.devFreeBuild){
    // free
  } else if(crafted){
    G.crafted[type]--;
  } else {
    for(const[item,need]of Object.entries(def.cost)){
      if((G.inv[item]||0)<need){toast(`Need ${need}× ${ITEMS[item]?.name||item}`,'wrn');sfx('error');return;}
    }
    for(const[item,need]of Object.entries(def.cost)) G.inv[item]-=need;
  }
  const m=mkMachine(type,tx,ty,placeDir);
  if(type==='miner')m.mineRes=G.map[ty][tx].res;
  if(type==='tunnel'){
    const[dvx,dvy]=D_VEC[placeDir];
    for(let dist=1;dist<=5;dist++){
      const lx=tx-dvx*dist,ly=ty-dvy*dist;
      if(lx<0||ly<0||lx>=MAP_W||ly>=MAP_H)break;
      const ltile=G.map[ly][lx];
      if(ltile.mid===null)continue;
      const lm=G.machines[ltile.mid];
      if(lm&&lm.type==='tunnel'&&lm.tunnelId===null&&lm.dir===placeDir){m.tunnelId=lm.id;lm.tunnelId=m.id;toast(`Tunnel linked! (${dist} tiles)`,'ok');break;}
    }
  }
  G.machines[m.id]=m;
  const[mw,mh]=def.size;
  for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++) G.map[ty+dy][tx+dx].mid=m.id;
  G.stats.placed++; updateHUD(); saveGame(); sfx('place');
  toast(`Placed ${def.name}`,'ok');
  document.getElementById('toolTip').classList.add('hidden');
}
function tryRemove(tx,ty){
  const mid=G.map[ty][tx].mid; if(mid===null)return;
  const m=G.machines[mid]; if(!m)return;
  const def=MDEFS[m.type];
  const[mw,mh]=def.size;
  for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++)
    G.map[m.y+dy][m.x+dx].mid=null;
  // Full refund
  for(const[item,n]of Object.entries(def.cost))
    G.inv[item]=(G.inv[item]||0)+n;
  // Return input buffer to inventory
  for(const[item,n]of Object.entries(m.inBuf))
    if(n>0)G.inv[item]=(G.inv[item]||0)+n;
  // Return output buffer to inventory
  for(const[item,n]of Object.entries(m.outBuf))
    if(n>0)G.inv[item]=(G.inv[item]||0)+n;
  // Return chest inventory
  for(const[item,n]of Object.entries(m.chestInv))
    if(n>0)G.inv[item]=(G.inv[item]||0)+n;
  delete G.machines[mid];
  if(openPanel==='machine')closePanel('machine');
  updateHUD(); saveGame(); sfx('remove');
  toast(`Removed ${def.name}`,'ok');
}

// ═══════════════════════════════════════════════════
//  SIMULATION
// ═══════════════════════════════════════════════════
let tickId=null;
function startTick(){
  if(tickId)clearInterval(tickId);
  tickId=setInterval(gameTick,TICK_MS);
}

function gameTick(){
  lastTickMs=performance.now();
  G.tick++;
  G.power.out=0; G.power.in=0;

  // Pre-pass: accumulate total power demand across ALL consumer machines
  // This must happen before any machine logic runs, so powerRatio() always
  // sees the full picture — not a partial tally.
  const pm0=perkMult();
  for(const m of Object.values(G.machines)){
    if(!m.active)continue;
    const def=MDEFS[m.type]; if(!def||def.power<=0)continue;
    // power-immune machines don't draw from grid
    if(m.type==='stone_furnace'||m.type==='blast_furnace')continue;
    const mods=m.modules||[];
    const modEff=mods.some(x=>x==='eff_module')?0.7:1;
    G.power.in+=def.power*pm0.power*modEff;
  }

  // Pass 1: generators and burners — establish power supply
  for(const m of Object.values(G.machines)){
    if(m.type==='generator'||m.type==='burner')runMachine(m);
  }
  // Pass 2: all other machines — powerRatio() now correct
  for(const m of Object.values(G.machines)){
    if(m.type!=='generator'&&m.type!=='burner')runMachine(m);
  }
  runBelts();
  if(G.tick%4===0){updateHUD();refreshOpenPanel();buildToolbar();checkAchievements();tickTutorial();}
  if(G.tick%120===0)saveGame();
}

function powerRatio(){
  if(G.power.out===0&&G.power.in===0)return 1; // nothing placed yet — free run
  if(G.power.out===0)return 0;                  // no generators at all
  if(G.power.in===0)return 1;                   // generators but no consumers
  if(G.power.out<G.power.in)return 0;           // hard cutoff — supply < demand
  return 1;                                      // supply meets demand
}

// Perk multipliers — reads G.perks.spent and returns composite modifiers
function perkMult(){
  const s=G.perks?.spent||{};
  return {
    yield: s.yield2?1.25 : s.yield1?1.10 : 1,
    speed: s.speed2?1.20 : s.speed1?1.10 : 1,
    belt:  s.belt1?1.20 : 1,
    power: s.power1?0.85 : 1, // multiplier on power draw (0.85 = -15%)
  };
}

// Items-per-minute tracking — call once per completed output
// Stores timestamps of last 60 completions per machine in a ring buffer
const RATE_WINDOW_MS = 60000; // 1 minute window
function recordOutput(m, count){
  if(!m._times) m._times=[];
  const now=Date.now();
  m._times.push({t:now,n:count});
  // Prune entries older than 1 minute
  m._times=m._times.filter(e=>now-e.t<RATE_WINDOW_MS);
}
function itemsPerMin(m){
  if(!m._times||!m._times.length)return 0;
  const now=Date.now();
  const recent=m._times.filter(e=>now-e.t<RATE_WINDOW_MS);
  if(!recent.length)return 0;
  const total=recent.reduce((a,e)=>a+e.n,0);
  // Scale to full minute based on window actually elapsed
  const windowMs=Math.min(RATE_WINDOW_MS, now-recent[0].t+TICK_MS);
  return Math.round(total/(windowMs/60000));
}

function runMachine(m){
  const def=MDEFS[m.type]; if(!m.active)return;
  // Modules: compute bonuses
  const mods=m.modules||[];
  const modSpeed=1+mods.filter(x=>x==='speed_module').length*0.25;
  const modYield=1+mods.filter(x=>x==='prod_module').length*0.25;
  const modEff=mods.some(x=>x==='eff_module')?0.7:1;
  // NOTE: G.power.in is pre-calculated in gameTick pre-pass — do NOT add here

  if(m.type==='generator'){
    // Burns 1 coal from inBuf every 4s — only burns when consumers are drawing power
    const hasFuel=(m.inBuf.coal||0)>0;
    if(hasFuel){
      G.power.out+=Math.abs(def.power);
      // Only consume coal if there are powered machines that need it (G.power.in from last tick)
      // Also guard: don't burn if there are NO machines that need power (prevents idle drain)
      const hasPowerConsumers=Object.values(G.machines).some(mm=>mm.active&&MDEFS[mm.type]?.power>0);
      if(G.tick%16===0&&hasPowerConsumers) m.inBuf.coal--;
    }
    return;
  }
  if(m.type==='burner'){
    // Burns 1 coal every 2s — only burns when consumers are drawing power
    const hasFuel=(m.inBuf.coal||0)>0;
    if(hasFuel){
      G.power.out+=Math.abs(def.power);
      const hasPowerConsumers=Object.values(G.machines).some(mm=>mm.active&&MDEFS[mm.type]?.power>0);
      if(G.tick%8===0&&hasPowerConsumers) m.inBuf.coal--;
    }
    return;
  }
  if(m.type==='miner'){
    if(!m.mineRes)return;
    const ratio=powerRatio();
    if(ratio===0)return; // hard cutoff — no power
    m.prog++;
    const pm=perkMult();
    const tierMult=m.tier===3?2:m.tier===2?1.5:1;
    const rate=Math.max(2,Math.floor(8/(ratio*pm.speed*tierMult*modSpeed)));
    if(m.prog>=rate){
      const bufTotal=Object.values(m.outBuf).reduce((a,b)=>a+b,0);
      if(bufTotal>=50)return;
      m.prog=0;
      const n=Math.random()<((pm.yield*tierMult*modYield)-1)?2:1;
      m.outBuf[m.mineRes]=(m.outBuf[m.mineRes]||0)+n;
      m.produced+=n;
      recordOutput(m,n);
    }
    return;
  }
  if(m.type==='chest'||m.type==='belt'||m.type==='splitter'||m.type==='tunnel'||m.type==='inserter'||m.type==='burner')return;

  if(!m.recipe)return;
  const rec=RECIPES[m.recipe]; if(!rec)return;
  // If recipe requires research not yet done, skip
  if(rec.unlock&&!G.research.done.includes(rec.unlock)){m.recipe=null;m.prog=0;return;}
  const pm=perkMult();
  // stone_furnace and blast_furnace are power-immune (coal is an ingredient, not power)
  const powerImmune=(m.type==='stone_furnace'||m.type==='blast_furnace');
  const ratio=powerImmune?1:powerRatio();
  if(ratio===0)return; // hard cutoff — no power
  const tierMult=m.tier===3?2:m.tier===2?1.5:1;
  const speedMult=ratio*pm.speed*tierMult*modSpeed;

  if(m.prog===0){
    if(canFill(m,rec)){consumeInputs(m,rec);m.prog=1;}
  } else {
    m.prog++;
    if(m.prog>=Math.ceil(rec.time/Math.max(.01,speedMult))){
      // Stall if output buffer full
      const bufTotal=Object.values(m.outBuf).reduce((a,b)=>a+b,0);
      if(bufTotal>=50)return;
      m.prog=0;
      for(const[item,n]of Object.entries(rec.out)){
        // prod module: chance of bonus output
        const bonus=modYield>1&&Math.random()<(modYield-1)?1:0;
        const total=n+bonus;
        m.outBuf[item]=(m.outBuf[item]||0)+total;
        m.produced+=total;
        recordOutput(m,total);
      }
    }
  }
}

function canFill(m,rec){
  for(const[item,need]of Object.entries(rec.in)){
    if((m.inBuf[item]||0)<need)return false;
  }
  return true;
}

function consumeInputs(m,rec){
  for(const[item,need]of Object.entries(rec.in)){
    m.inBuf[item]=(m.inBuf[item]||0)-need;
  }
}

function runBelts(){
  const pm=perkMult();
  const beltSpeed=(G.research.done.includes('logistics')?.15:.1)*pm.belt;

  // Advance items on belt/splitter/tunnel
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++){
    const tile=G.map[ty][tx]; if(tile.mid===null)continue;
    const m=G.machines[tile.mid]; if(!m)continue;
    if(m.type!=='belt'&&m.type!=='splitter'&&m.type!=='tunnel')continue;
    for(const it of tile.items)it.prog=Math.min(1,it.prog+beltSpeed);
  }

  // Transfer completed items
  for(let ty=0;ty<MAP_H;ty++)for(let tx=0;tx<MAP_W;tx++){
    const tile=G.map[ty][tx]; if(tile.mid===null)continue;
    const m=G.machines[tile.mid]; if(!m)continue;
    if(m.type!=='belt'&&m.type!=='splitter'&&m.type!=='tunnel')continue;

    // Tunnel: teleport items to exit
    if(m.type==='tunnel'&&m.tunnelId!==null){
      const exit=G.machines[m.tunnelId];
      if(exit&&tile.items.length>0){
        const arrived=tile.items.filter(it=>it.prog>=1);
        if(arrived.length){
          tile.items=tile.items.filter(it=>it.prog<1);
          const exTile=G.map[exit.y][exit.x];
          for(const it of arrived){it.prog=0;exTile.items.push(it);}
        }
      }
      continue;
    }

    const arrived=tile.items.filter(it=>it.prog>=1);
    if(!arrived.length)continue;
    tile.items=tile.items.filter(it=>it.prog<1);
    const[dvx,dvy]=D_VEC[m.dir];

    // Splitter: alternate outputs
    if(m.type==='splitter'){
      const fx=tx+dvx,fy=ty+dvy;                 // forward
      const lx=tx+dvy, ly=ty-dvx;                // left (CCW 90°)
      const rx=tx-dvy, ry=ty+dvx;                // right (CW 90°)
      for(const it of arrived){
        m.splitSide=(m.splitSide||0);
        // Alternate between left and right; fall back to forward
        const side=m.splitSide%2;
        m.splitSide++;
        const sideA=side===0?{x:lx,y:ly}:{x:rx,y:ry};
        const sideB=side===0?{x:rx,y:ry}:{x:lx,y:ly};
        let placed=false;
        for(const dest of [sideA,sideB,{x:fx,y:fy}]){
          if(dest.x<0||dest.y<0||dest.x>=MAP_W||dest.y>=MAP_H)continue;
          const nt=G.map[dest.y][dest.x]; if(nt.mid===null)continue;
          const nm=G.machines[nt.mid];
          if(nm&&(nm.type==='belt'||nm.type==='splitter')&&nt.items.length<4){
            it.prog=0;nt.items.push(it);placed=true;break;
          }
        }
        if(!placed){it.prog=0.99;tile.items.push(it);}
      }
      continue;
    }

    // Normal belt
    const nx=tx+dvx,ny=ty+dvy;
    if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H){
      for(const it of arrived){it.prog=0.99;tile.items.push(it);}
      continue;
    }
    const next=G.map[ny][nx];
    for(const it of arrived){
      if(next.mid!==null){
        const nm=G.machines[next.mid];
        if((nm.type==='belt'||nm.type==='splitter')&&next.items.length<4){
          it.prog=0;next.items.push(it);
        } else if(nm.type==='tunnel'){
          it.prog=0;next.items.push(it);
        } else if(nm.type==='chest'){
          nm.chestInv[it.id]=(nm.chestInv[it.id]||0)+1;
        } else {
          // All other machines (assembler, furnace, etc) — belts cannot feed directly, back-pressure
          it.prog=0.99;tile.items.push(it);
        }
      } else {
        it.prog=0.99;tile.items.push(it);
      }
    }
  }

  // Inserters every 4 ticks
  if(G.tick%4!==0)return;
  for(const m of Object.values(G.machines)){
    if(m.type==='inserter')runInserter(m);
  }
}

function runInserter(m){
  // Fix 3: inserters need power to operate
  if(powerRatio()===0)return;

  const[dvx,dvy]=D_VEC[m.dir];
  const sx=m.x-dvx, sy=m.y-dvy; // source tile (behind inserter)
  const dx=m.x+dvx, dy=m.y+dvy; // destination tile (in front)
  if(sx<0||sy<0||sx>=MAP_W||sy>=MAP_H)return;
  if(dx<0||dy<0||dx>=MAP_W||dy>=MAP_H)return;

  const src=G.map[sy][sx];
  const dst=G.map[dy][dx];

  // Flush any pending deposits whose delay has elapsed (arm reached dest)
  if(!m._pending)m._pending=[];
  for(let i=m._pending.length-1;i>=0;i--){
    const p=m._pending[i];
    if(G.tick>=p.at){
      // Now actually deposit — if destination belt is full, retry next tick (hold item)
      if(dst.mid!==null){
        const dm=G.machines[dst.mid];
        if(dm&&dm.type==='belt'){
          if(dst.items.length<4){
            dst.items.push({id:p.item,prog:0});
            m._pending.splice(i,1);
            m.lastTransferMs=performance.now(); // trigger swing animation on success
          }
          // else: belt full — keep pending, arm holds still
        } else if(dm&&dm.type==='chest'){
          const chestTotal=Object.values(dm.chestInv).reduce((a,b)=>a+b,0);
          if(chestTotal<200){
            dm.chestInv[p.item]=(dm.chestInv[p.item]||0)+1;
            m._pending.splice(i,1);
            m.lastTransferMs=performance.now();
          }
          // else: chest full — keep pending, arm holds still
        } else if(dm&&dm.type!=='belt'&&dm.type!=='inserter'){
          if((dm.inBuf[p.item]||0)<50){
            dm.inBuf[p.item]=(dm.inBuf[p.item]||0)+1;
            m._pending.splice(i,1);
            m.lastTransferMs=performance.now();
          }
          // else: this item's slot is full — keep pending, arm holds still
        } else {
          returnItem(src,p.item);
          m._pending.splice(i,1);
        }
      } else {
        returnItem(src,p.item);
        m._pending.splice(i,1);
      }
    }
  }

  // Only grab a new item if arm is at rest (no pending)
  if(m._pending.length>0)return;

  // ── Destination check FIRST — before touching source ──
  // If destination can't accept right now, don't grab anything
  if(dst.mid===null)return; // empty floor — nothing to deposit into
  const dm=G.machines[dst.mid];
  if(!dm)return;
  // Can't deposit into the output face of a machine
  if(dm.type!=='belt'&&dm.type!=='chest'&&dm.type!=='inserter'&&isOutputFacing(dm,dvx,dvy))return;
  if(dm.type==='chest'&&isOutputFacing(dm,dvx,dvy))return;
  // Belt full — wait
  if(dm.type==='belt'&&dst.items.length>=4)return;

  // ── Grab one item from source ──
  let item=null;
  if(src.mid!==null){
    const sm=G.machines[src.mid];
    if(sm&&sm.type==='belt'){
      const ready=src.items.filter(it=>it.prog>=0.9);
      if(ready.length>0){
        const it=ready[0];
        src.items.splice(src.items.indexOf(it),1);
        item=it.id;
      }
    } else if(sm&&sm.type==='chest'){
      for(const[k,v]of Object.entries(sm.chestInv)){if(v>0){item=k;sm.chestInv[k]--;break;}}
    } else if(sm&&sm.type!=='belt'&&sm.type!=='inserter'){
      if(isOutputFacing(sm,-dvx,-dvy)){
        for(const[k,v]of Object.entries(sm.outBuf)){if(v>0){item=k;sm.outBuf[k]--;break;}}
      }
    }
  }
  if(!item)return;

  // Queue deposit — arm reaches dest after half swing duration
  const swingDur=10;
  const depositAt=G.tick+Math.floor(swingDur/2);
  m._pending.push({item,at:depositAt});
  m.lastTransfer=G.tick;
  // Note: lastTransferMs is set only when deposit actually succeeds, so arm only swings then
}


// Returns true if the inserter is trying to deposit into the machine's output side.
// dvx,dvy = inserter direction vector (toward destination machine).
// The face being entered is the OPPOSITE: if inserter goes right (+1,0), it enters the LEFT face of the machine.
function isOutputFacing(dm,dvx,dvy){
  const ports=PORTS[dm.type]; if(!ports||!ports.outputs.length)return false;
  const SIDES=['top','right','bottom','left'];
  const rot=dm.dir||0;
  // Entry face = side of the machine the inserter is entering from
  // Inserter moves right (+1,0) → enters the LEFT face of destination
  let entryFace;
  if(dvx===1  &&dvy===0) entryFace='left';
  if(dvx===-1 &&dvy===0) entryFace='right';
  if(dvx===0  &&dvy===1) entryFace='top';
  if(dvx===0  &&dvy===-1)entryFace='bottom';
  for(const p of ports.outputs){
    const rSide=SIDES[(SIDES.indexOf(p.side)+rot)%4];
    if(rSide===entryFace)return true;
  }
  return false;
}

// Delete the now-unused side-checking helpers
function isOutputSide(){ return true; }
function isInputSide(){ return true; }
function sideVec(side){ return side==='right'?[1,0]:side==='left'?[-1,0]:side==='bottom'?[0,1]:[0,-1]; }
function outputTile(m,side){
  const[mw,mh]=MDEFS[m.type].size;
  switch(side){
    case 'right':  return [m.x+mw, m.y+Math.floor(mh/2)];
    case 'left':   return [m.x-1,  m.y+Math.floor(mh/2)];
    case 'bottom': return [m.x+Math.floor(mw/2), m.y+mh];
    case 'top':    return [m.x+Math.floor(mw/2), m.y-1];
  }
}
function inputTile(m,side){ return outputTile(m,side); }

function returnItem(srcTile,item){
  if(srcTile.mid!==null){
    const sm=G.machines[srcTile.mid];
    if(sm&&sm.type==='belt')srcTile.items.unshift({id:item,prog:.9});
    else if(sm&&sm.type==='chest')sm.chestInv[item]=(sm.chestInv[item]||0)+1;
    else G.inv[item]=(G.inv[item]||0)+1;
  } else {
    G.inv[item]=(G.inv[item]||0)+1;
  }
}

const HUD_ITEMS=['iron_ore','iron_plate','copper_plate','iron_gear','circuit','sci_red','coal'];

function updateHUD(){
  const el=document.getElementById('hudRes');
  // Power only — inventory is in the inventory panel
  const free=G.power.out-G.power.in;
  const hasConsumers=G.power.in>0;
  const pwrLabel=hasConsumers?(free>=0?`+${fmt(free)}kW`:`${fmt(free)}kW`):`${fmt(G.power.out)}kW`;
  el.innerHTML=`<div class="hres"><span class="hres-icon">⚡</span><span class="hres-val" style="color:${pwrCol()}">${pwrLabel}</span></div>`;
}

function pwrCol(){
  if(G.power.in===0)return'var(--green)'; // no consumers — all good
  const free=G.power.out-G.power.in;
  if(free<0)return'var(--red)';
  if(free<G.power.in*.2)return'var(--amber)'; // less than 20% headroom
  return'var(--green)';
}
function fmt(n){
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1000)return(n/1000).toFixed(1)+'k';
  return Math.floor(n)+'';
}

function buildToolbar(){
  const el=document.getElementById('toolbar');
  el.innerHTML=TOOLBAR_DEF.map(cat=>{
    const items=cat.items.map(item=>{
      const def=MDEFS[item.id];
      const locked=def?.unlock&&!G.research.done.includes(def.unlock)&&!def.stub;
      const unaffordable=!locked&&def&&Object.keys(def.cost).length>0&&
        !Object.entries(def.cost).every(([k,v])=>(G.inv[k]||0)+(G.crafted?.[item.id]||0)>=v);
      const sel=activeTool===item.id?'sel':'';
      const lk=locked?'locked':'';
      const stub=def?.stub?'stub':'';
      const ua=unaffordable&&!locked&&!def?.stub?'unaffordable':'';
      const tt=def?.stub?`[FUTURE] ${def.desc}`:item.name+(locked?` [Requires: ${TECHS[def.unlock]?.name}]`:unaffordable?` [Need materials to build]`:'');
      const icon=item.icon;
      const name=item.name;
      return `<div class="titem ${sel} ${lk} ${stub} ${ua}" onclick="setTool('${item.id}')" title="${tt}">
        <span class="ticon">${icon}</span>
        <span class="tname">${name}</span>
      </div>`;
    }).join('');
    return `<div class="tcat"><div class="tcat-lbl">${cat.label}</div><div class="titems">${items}</div></div>`;
  }).join('');
}

function setTool(id){
  if(id==='craft'){togglePanel('craft');return;}
  if(id==='rotate'){
    activeTool='rotate'; closeResInfo(); buildToolbar();
    return;
  }
  if(id==='move'){
    activeTool='move'; moveState={active:false,machineId:null,origX:0,origY:0};
    closeResInfo(); buildToolbar(); return;
  }
  if(id==='blueprint'){
    activeTool='blueprint';
    // Don't reset if we're mid-paste — startPasteBlueprint already set the state
    if(blueprintState.mode!=='holding') blueprintState={mode:'idle',x1:0,y1:0,x2:0,y2:0,data:[]};
    closeResInfo(); buildToolbar(); return;
  }
  // Switching away from move tool — restore any held machine
  if(activeTool==='move'&&moveState.active){
    const m=G.machines[moveState.machineId];
    if(m){
      const def=MDEFS[m.type]; const[mw,mh]=def.size;
      m.x=moveState.origX; m.y=moveState.origY;
      for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++)
        G.map[moveState.origY+dy][moveState.origX+dx].mid=m.id;
    }
    moveState={active:false,machineId:null,origX:0,origY:0};
  }
  const def=MDEFS[id];
  if(def?.stub){toast('[FUTURE] Not yet active in Zone 1','wrn');return;}
  if(def?.unlock&&!G.research.done.includes(def.unlock)){
    toast(`Requires: ${TECHS[def.unlock]?.name||def.unlock}`,'wrn'); sfx('error'); return;
  }
  activeTool=id; closeResInfo(); buildToolbar(); updateToolTip();
}

function updateToolTip(){
  const el=document.getElementById('toolTip');
  const id=activeTool;

  // No tooltip for select / mine / demolish / rotate / move
  if(id==='select'||id==='mine'||id==='demolish'||id==='rotate'||id==='move'||id==='blueprint'){el.classList.add('hidden');return;}

  const def=MDEFS[id];
  if(!def){el.classList.add('hidden');return;}

  // Cost string
  const costStr=Object.keys(def.cost).length
    ? Object.entries(def.cost).map(([k,v])=>`<span>${v}×${ITEMS[k]?.name||k}</span>`).join(' + ')
    : '<span>Free</span>';

  // Recipe cards — only for machines with recipes
  let recipesHtml='';
  if(def.recipes.length){
    recipesHtml=`<div class="tt-recipes">
      <div class="tt-rlabel">RECIPES</div>`;
    for(const rid of def.recipes){
      const r=RECIPES[rid]; if(!r)continue;
      const ins=Object.entries(r.in).map(([k,v])=>`${v}× ${ITEMS[k]?.name||k}`).join(' + ');
      const outs=Object.entries(r.out).map(([k,v])=>`${v}× ${ITEMS[k]?.name||k}`).join(' + ');
      const secs=((r.time*TICK_MS)/1000).toFixed(1);
      recipesHtml+=`<div class="tt-recipe">
        <span class="tt-rin">${ins}</span>
        <span style="color:var(--text3)"> → </span>
        <span class="tt-rout">${outs}</span>
        <span class="tt-rtime"> · ${secs}s</span>
      </div>`;
    }
    recipesHtml+='</div>';
  }

  // Special notes per machine
  const notes={
    miner:   'Place on a resource deposit. Outputs to bottom.',
    generator:'Consumes 1 coal every 4s. Produces 60kW.',
    belt:    'Tap placed belt to rotate direction.',
    inserter:'Points away from source toward destination. Tap to rotate.',
    chest:   'Stores up to 200 items. Input top, output bottom.',
  };

  const unlockNote=def.unlock&&!G.research.done.includes(def.unlock)
    ?`<div style="font-size:5px;color:var(--red);margin-bottom:5px">🔒 Requires: ${TECHS[def.unlock]?.name}</div>`:'';

  el.innerHTML=`
    <div class="tt-head">
      <span class="tt-icon">${def.icon}</span>
      <span class="tt-name">${def.name}</span>
    </div>
    ${unlockNote}
    <div class="tt-desc">${def.desc}${notes[id]?'<br>'+notes[id]:''}</div>
    <div class="tt-cost">Cost: ${costStr}</div>
    ${def.power>0?`<div class="tt-cost">Power: <span>${def.power}kW</span></div>`:''}
    ${def.power<0?`<div class="tt-cost">Generates: <span>${Math.abs(def.power)}kW</span></div>`:''}
    ${recipesHtml}`;
  el.classList.remove('hidden');
}

let openPanel=null;
let inspectId=null;

function togglePanel(id){
  if(openPanel===id){closePanel(id);return;}
  if(openPanel)closePanel(openPanel);
  openPanel=id;
  document.getElementById('toolTip').classList.add('hidden');
  document.getElementById('p'+cap(id))?.classList.add('open');
  document.getElementById('btn'+cap(id))?.classList.add('on');
  if(id==='inv')     renderInvPanel();
  if(id==='craft')   renderCraftPanel();
  if(id==='research')renderResPanel();
  if(id==='rocket')  renderRocketPanel();
  if(id==='perks')   renderPerksPanel();
  if(id==='dev')     renderDevPanel();
  if(id==='stats')   renderStatsPanel();
  if(id==='achieve') renderAchievePanel();
  if(id==='blueprint') renderBlueprintPanel();
  if(id==='recipes') renderRecipesPanel();
}

function closePanel(id){
  const pid=id||openPanel; if(!pid)return;
  document.getElementById('p'+cap(pid))?.classList.remove('open');
  document.getElementById('btn'+cap(pid))?.classList.remove('on');
  if(openPanel===pid)openPanel=null;
}

function refreshOpenPanel(){
  if(openPanel==='inv')     renderInvPanel();
  if(openPanel==='craft')   renderCraftPanel();
  if(openPanel==='machine') renderMachPanel();
  if(openPanel==='research')renderResPanel();
  if(openPanel==='rocket')  renderRocketPanel();
  if(openPanel==='dev')     renderDevPanel();
  if(openPanel==='stats')   renderStatsPanel();
  if(openPanel==='achieve') renderAchievePanel();
  if(openPanel==='blueprint') renderBlueprintPanel();
  if(openPanel==='recipes') renderRecipesPanel();
}

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}

// ── Inventory ─────────────────────────────────────
function renderInvPanel(){
  const catLabels={raw:'Raw',smelted:'Smelted',parts:'Parts',science:'Science',rocket:'Rocket'};
  const bycat={};
  for(const[id,item]of Object.entries(ITEMS)){
    if(!bycat[item.cat])bycat[item.cat]=[];
    bycat[item.cat].push({id,...item,n:G.inv[id]||0});
  }
  let html='';
  for(const[cat,lbl]of Object.entries(catLabels)){
    const items=(bycat[cat]||[]).filter(i=>i.n>0);
    if(!items.length)continue;
    html+=`<div style="margin-bottom:10px"><span class="sec-label">${lbl}</span><div class="grid4">`;
    for(const i of items)
      html+=`<div class="inv-item"><span class="ii">${i.icon}</span><span class="iv">${fmt(i.n)}</span><span class="in">${i.name}</span></div>`;
    html+='</div></div>';
  }
  if(!html)html=`<div style="color:var(--text3);font-size:6px;text-align:center;padding:20px;line-height:2.2">Collect resources<br>using the ⛏️ Mine tool.</div>`;

  // Crafted-but-not-placed pool
  const craftedItems=Object.entries(G.crafted||{}).filter(([,v])=>v>0);
  if(craftedItems.length){
    html+=`<div style="margin-bottom:10px;padding:8px;border:1px solid var(--amberDim);background:var(--bg3)">
      <span class="sec-label" style="color:var(--amber)">READY TO PLACE</span>`;
    for(const[id,n]of craftedItems)
      html+=`<div style="font-size:6px;color:var(--amber);margin-bottom:3px">${MDEFS[id]?.icon} ${MDEFS[id]?.name} ×${n}</div>`;
    html+='</div>';
  }

  document.getElementById('pInvBody').innerHTML=html;
}

    const outStr=Object.entries(r.out).map(([k,v])=>{

  }

    const borderCol=canBuild?'var(--border2)':isLocked?'var(--border)':'var(--border)';
    const opacity=canBuild?1:isLocked?.2:.45;
    const filterVal=isLocked?'grayscale(1)':canAfford?'none':'grayscale(0.5)';
    html+=`<div style="border:1px solid ${borderCol};background:var(--bg3);padding:7px;margin-bottom:4px;opacity:${opacity};filter:${filterVal}">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:6px;color:${canBuild?'var(--text)':'var(--text3)'};margin-bottom:2px">${def.icon} ${def.name}${queued>0?` <span style="color:var(--amber)">[${queued} ready]</span>`:''}${isLocked?` <span style="color:var(--text3)">🔒</span>`:''}</div>
          <div style="font-size:5px;color:var(--text3)">${isLocked?`Requires: ${TECHS[def.unlock]?.name||def.unlock}`:costStr}</div>
        </div>
        <button class="mini-btn ${canBuild?'teal':'dim'}" onclick="buildMachine('${mid}')" ${canBuild?'':'disabled'}>BUILD</button>
      </div>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function buildMachine(mid){
  const def=MDEFS[mid]; if(!def)return;
  if(!G.devFreeBuild){
    for(const[item,need]of Object.entries(def.cost)){
      if((G.inv[item]||0)<need){toast(`Need ${need}× ${ITEMS[item]?.name||item}`,'wrn');sfx('error');return;}
    }
    for(const[item,need]of Object.entries(def.cost)) G.inv[item]-=need;
  }
  if(!G.crafted)G.crafted={};
  G.crafted[mid]=(G.crafted[mid]||0)+1;
  sfx('craft');
  toast(`${def.name} built — select from toolbar to place`,'ok');
  updateHUD(); renderCraftPanel();
}

function startCraft(id){
  const r=HAND_CRAFTS.find(h=>h.id===id); if(!r)return;
  // Just check affordability for visual feedback — don't deduct yet
  if(!G.devFreeCraft){
    const canAfford=Object.entries(r.in).every(([k,v])=>(G.inv[k]||0)>=v);
    if(!canAfford){
      for(const[item,need]of Object.entries(r.in)){
        if((G.inv[item]||0)<need){toast(`Need ${need}× ${ITEMS[item]?.name||item}`,'wrn');sfx('error');return;}
      }
    }
  }
  G.craftState={recipeId:id, clicks:0};
  updateHUD(); renderCraftPanel(); sfx('tap');
}

function hammerClick(){
  const cs=G.craftState; if(!cs||!cs.recipeId)return;
  const r=HAND_CRAFTS.find(h=>h.id===cs.recipeId); if(!r)return;

  cs.clicks++;
  sfx('tap');

  // Animate the hammer button
  const btn=document.getElementById('hammerBtn');
  if(btn){
    btn.style.transform='scale(.88) rotate(-12deg)';
    setTimeout(()=>{if(btn)btn.style.transform='scale(1) rotate(0deg)';},80);
  }

  if(cs.clicks>=r.clicks){
    // Final click — check materials are still available, then deduct and give output
    if(!G.devFreeCraft){
      const canAfford=Object.entries(r.in).every(([k,v])=>(G.inv[k]||0)>=v);
      if(!canAfford){
        G.craftState={recipeId:null,clicks:0};
        toast('Not enough materials — craft cancelled','bad'); sfx('error');
        updateHUD(); renderCraftPanel(); return;
      }
      for(const[item,need]of Object.entries(r.in)) G.inv[item]-=need;
    }
    for(const[item,n]of Object.entries(r.out)) G.inv[item]=(G.inv[item]||0)+n;
    const outStr=Object.entries(r.out).map(([k,v])=>`${v}× ${ITEMS[k]?.name||k}`).join(', ');
    sfx('craft'); toast(`Crafted: ${outStr}`,'ok');
    updateHUD();
    // Auto-repeat: start next batch if still affordable
    const canRepeat=G.devFreeCraft||Object.entries(r.in).every(([k,v])=>(G.inv[k]||0)>=v);
    if(canRepeat){
      cs.clicks=0;
    } else {
      G.craftState={recipeId:null,clicks:0};
    }
  }
  renderCraftPanel();
}

function cancelCraft(){
  // No refund needed — materials were never deducted until completion
  G.craftState={recipeId:null,clicks:0};
  updateHUD(); renderCraftPanel();
  toast('Crafting cancelled','ok');
}


// ── Machine Inspector ──────────────────────────────
function openMachinePanel(m){
  if(!m)return;
  inspectId=m.id;
  document.getElementById('pMachTitle').textContent=`${MDEFS[m.type].icon} ${MDEFS[m.type].name}`;
  renderMachPanel();
  togglePanel('machine');
}

function renderMachPanel(){
  const el=document.getElementById('pMachBody'); if(!el||inspectId===null)return;
  const m=G.machines[inspectId]; if(!m){closePanel('machine');return;}
  const def=MDEFS[m.type];
  const rec=m.recipe?RECIPES[m.recipe]:null;
  const ratio=powerRatio();
  const pm2=perkMult();
  const speedMult=ratio*(m.type==='stone_furnace'?1:pm2.speed);
  const subTick=Math.min(1,(performance.now()-lastTickMs)/TICK_MS);
  const smoothProg=rec&&m.prog>0?Math.min(rec.time,m.prog+speedMult*subTick):m.prog;
  const pct=rec?Math.min(100,Math.round(smoothProg/rec.time*100)):0;

  let html=`<div class="card">`;
  const noPower=ratio===0&&def.power>0; // powered machine with no power
  const minerStatus = m.type==='miner'
    ? (noPower ? `<span style="color:var(--red)">⚡ No power</span>`
      : m.mineRes ? `<span style="color:var(--green)">▶ Mining ${ITEMS[m.mineRes]?.name||m.mineRes}</span>`
      : `<span style="color:var(--red)">✗ Not on deposit</span>`)
    : null;
  const noRecipeTypes=['belt','splitter','tunnel','inserter','generator','burner','miner'];
  const recipeStatus = !m.active
    ? `<span style="color:var(--text3)">⏸ Paused</span>`
    : noPower
    ? `<span style="color:var(--red)">⚡ No power</span>`
    : m.recipe ? `<span style="color:var(--green)">▶ ${m.type==='lab'?'Researching':'Running'}: ${RECIPES[m.recipe]?.name||''}</span>`
    : `<span style="color:var(--amber)">⚠ No recipe</span>`;
  const chestCap=m.type==='chest'?`<span style="color:var(--amber)">${Object.values(m.chestInv).reduce((a,b)=>a+b,0)}/200 stored</span>`:null;
  const statusVal = chestCap || minerStatus
    || (noRecipeTypes.includes(m.type)
      ? (m.active ? `<span style="color:var(--green)">▶ Active</span>` : `<span style="color:var(--text3)">⏸ Paused</span>`)
      : (m.active ? recipeStatus : `<span style="color:var(--text3)">⏸ Paused</span>`));
  html+=irow('Status', statusVal);
  if(def.power>0)html+=irow('Power',`${Math.round(def.power)}kW`);
  if(def.power<0)html+=irow('Generating',`${Math.abs(def.power)}kW`);
  html+=irow('Total produced',fmt(m.produced));
  if((m.tier||1)>1) html+=irow('Tier',`<span style="color:${(m.tier||1)>=3?'var(--teal)':'var(--amber)'}">T${m.tier||1} (${m.tier===3?'2×':'1.5×'} speed/yield)</span>`);
  if(m.type!=='chest'&&m.type!=='belt'&&m.type!=='inserter'&&m.type!=='generator'){
    const rate=itemsPerMin(m);
    const rateCol=rate===0?'var(--text3)':rate<2?'var(--amber)':'var(--green)';
    html+=irow('Rate',`<span style="color:${rateCol}">${rate}/min</span>`);
  }
  // Show active perk bonuses
  const pm=perkMult();
  if(pm.speed>1||pm.yield>1){
    const bonuses=[];
    if(pm.speed>1)bonuses.push(`+${Math.round((pm.speed-1)*100)}% speed`);
    if(pm.yield>1)bonuses.push(`+${Math.round((pm.yield-1)*100)}% yield`);
    html+=irow('Perks',`<span style="color:var(--teal)">${bonuses.join(', ')}</span>`);
  }
  if(m.type==='chest'){
    const tot=Object.values(m.chestInv).reduce((a,b)=>a+b,0);
    html+=irow('Stored',`${tot}/200`);
    if(tot>0){
      html+=`<div style="border-top:1px solid var(--border);margin:6px 0 4px"></div>`;
      html+=`<button class="full-btn amber" onclick="chestCollectAll(${m.id})" style="margin-bottom:6px">↑ COLLECT ALL</button>`;
      const stored=Object.entries(m.chestInv).filter(([,v])=>v>0);
      html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:4px">`;
      for(const[k,v]of stored){
        html+=`<div style="border:1px solid var(--border);background:var(--bg);padding:5px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="chestTakeOne('${k}',${m.id})">
          <span style="font-size:10px">${ITEMS[k]?.icon||'?'}</span>
          <span style="font-size:5px;color:var(--amber)">${v}</span>
          <span style="font-size:4px;color:var(--teal)">TAKE</span>
        </div>`;
      }
      html+=`</div>`;
    } else {
      html+=`<div style="font-size:5px;color:var(--text3);margin-top:4px">Empty</div>`;
    }
  }
  if(rec){
    html+=`<div style="font-size:5px;color:var(--text3);margin:6px 0 2px">Progress</div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div style="font-size:5px;color:var(--text3)">${pct}%</div>`;
  }
  const inItems=Object.entries(m.inBuf).filter(([,v])=>v>0);
  const outItems=Object.entries(m.outBuf).filter(([,v])=>v>0);
  const bufTotal=Object.values(m.outBuf).reduce((a,b)=>a+b,0);

  if(outItems.length||inItems.length){
    html+=`<div style="height:1px;background:var(--border);margin:8px 0"></div>`;
  }
  if(outItems.length){
    const bufFull=bufTotal>=50;
    html+=`<div style="font-size:5px;color:${bufFull?'var(--red)':'var(--amber)'};margin-bottom:4px">
      ▲ Output${bufFull?' (FULL — stalled)':''}: ${outItems.map(([k,v])=>`${v}× ${ITEMS[k]?.name||k}`).join(', ')}
    </div>`;
    html+=`<button class="full-btn amber" onclick="emptyOutput(${m.id})" style="margin-bottom:6px">↑ EMPTY TO INVENTORY</button>`;
  } else if(def.recipes.length||m.type==='miner'){
    html+=`<div style="font-size:5px;color:var(--text3);margin-bottom:6px">Output: empty</div>`;
  }
  if(inItems.length){
    html+=`<div style="font-size:5px;color:var(--blue);margin-bottom:4px">▼ Input buffer: ${inItems.map(([k,v])=>`${v}× ${ITEMS[k]?.name||k}`).join(', ')}</div>`;
    html+=`<button class="full-btn" style="font-size:5px;border-color:var(--blue);color:var(--blue)" onclick="ejectBuf(${m.id})">↩ RETURN INPUTS TO INVENTORY</button>`;
  }
  // Feed coal manually for generators/burners/furnaces
  if((m.type==='generator'||m.type==='burner'||m.type==='stone_furnace'||m.type==='blast_furnace')){
    const coalInInv=G.inv.coal||0;
    const coalInBuf=m.inBuf.coal||0;
    const isFurnace=(m.type==='stone_furnace'||m.type==='blast_furnace');
    html+=`<div style="margin-top:6px">
      ${irow('Coal in buffer',`<span style="color:${coalInBuf>0?'var(--green)':'var(--red)'}">${coalInBuf}</span>`)}
      ${isFurnace?`<div style="font-size:4px;color:var(--text3);margin-bottom:4px">Coal is consumed as fuel per recipe. Can also be belt-fed.</div>`:''}
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="mini-btn ${coalInInv>=1?'amber':'dim'}" style="flex:1" onclick="feedCoal(${m.id},1)" ${coalInInv>=1?'':'disabled'}>+1 Coal</button>
        <button class="mini-btn ${coalInInv>=10?'amber':'dim'}" style="flex:1" onclick="feedCoal(${m.id},10)" ${coalInInv>=10?'':'disabled'}>+10 Coal</button>
      </div>
      <div style="font-size:4px;color:var(--text3);margin-top:3px">Inventory: ${coalInInv} coal</div>
    </div>`;
  }
  html+=`</div>`;

  // Recipe picker — selected recipe shown at top with material requirements
  if(def.recipes.length){
    // If a recipe is selected, show it prominently at the top
    if(m.recipe){
      const rec=RECIPES[m.recipe];
      if(rec){
        const inBufItems=Object.entries(m.inBuf).filter(([,v])=>v>0);
        html+=`<div style="border:2px solid var(--amber);background:rgba(245,166,35,.06);padding:9px;margin-bottom:8px">
          <div style="font-size:6px;color:var(--amber);margin-bottom:6px">▶ ${rec.name}</div>
          <div style="font-size:5px;color:var(--text3);margin-bottom:4px">Required inputs:</div>
          <div style="margin-bottom:4px">`;
        for(const[item,need]of Object.entries(rec.in)){
          const inBuf=m.inBuf[item]||0;
          const col=inBuf>=need?'var(--green)':'var(--amber)';
          html+=`<div style="font-size:5px;margin-bottom:2px;color:${col}">${ITEMS[item]?.icon||''} ${ITEMS[item]?.name||item}: ${inBuf}/${need} in buffer</div>`;
        }
        html+=`</div></div>`;
      }
    }
    html+=`<span class="sec-label">RECIPE</span>
    <div style="margin-bottom:8px">
      <div onclick="setRecipe(${m.id},'')" style="padding:6px 8px;margin-bottom:3px;border:1px solid ${!m.recipe?'var(--amber)':'var(--border)'};background:${!m.recipe?'rgba(245,166,35,.08)':'var(--bg3)'};cursor:pointer;font-size:5px;color:${!m.recipe?'var(--amber)':'var(--text3)'}">— none —</div>`;
    for(const rid of def.recipes){
      const r=RECIPES[rid]; if(!r)continue;
      const recUnlocked=!r.unlock||G.research.done.includes(r.unlock);
      if(!recUnlocked){
        const reqName=TECHS[r.unlock]?.name||r.unlock;
        html+=`<div style="padding:6px 8px;margin-bottom:3px;border:1px solid var(--border);background:var(--bg3);opacity:0.4;cursor:not-allowed">
          <div style="font-size:6px;color:var(--text3)">🔒 ${r.name} — requires ${reqName}</div>
        </div>`;
        continue;
      }
      const ins=Object.entries(r.in).map(([k,v])=>`${v}×${ITEMS[k]?.name||k}`).join(' + ');
      const outs=Object.entries(r.out).map(([k,v])=>`${v}×${ITEMS[k]?.name||k}`).join(' + ');
      const sel=m.recipe===rid;
      html+=`<div onclick="setRecipe(${m.id},'${rid}')" style="padding:6px 8px;margin-bottom:3px;border:1px solid ${sel?'var(--amber)':'var(--border)'};background:${sel?'rgba(245,166,35,.08)':'var(--bg3)'};cursor:pointer">
        <div style="font-size:6px;color:${sel?'var(--amber)':'var(--text)'};margin-bottom:2px">${r.name}${sel?' ✓':''}</div>
        <div style="font-size:6px;color:var(--blue)">${ins}</div>
        <div style="font-size:6px;color:var(--text3)">→ ${outs}</div>
      </div>`;
    }
    html+=`</div>`;
  }

  // Rotate
  if(m.type==='belt'||m.type==='inserter'||m.type==='splitter'||m.type==='tunnel')
    html+=`<button class="full-btn teal" onclick="rotateM(${m.id})">↻ ROTATE  ${D_ARR[m.dir]}</button>`;

  // Module slots (T2 = 1 slot, T3 = 2 slots)
  const UPGRADEABLE=['miner','blast_furnace','electric_smelter','assembler','lab'];
  const MODULE_DEFS={
    speed_module:{name:'Speed Module', icon:'🔵', desc:'+25% speed'},
    prod_module: {name:'Prod. Module', icon:'🟢', desc:'+25% yield'},
    eff_module:  {name:'Eff. Module',  icon:'🔴', desc:'-30% power'},
  };
  if(UPGRADEABLE.includes(m.type)){
    const tier=m.tier||1;
    const slots=tier-1; // T1=0, T2=1, T3=2
    if(slots>0){
      if(!m.modules)m.modules=[];
      html+=`<div style="border:1px solid var(--border);background:var(--bg3);padding:7px;margin-top:6px">
        <span class="sec-label">MODULE SLOTS (${m.modules.length}/${slots})</span>`;
      for(let si=0;si<slots;si++){
        const installed=m.modules[si];
        if(installed){
          const md=MODULE_DEFS[installed];
          html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding:4px;border:1px solid var(--tealDim);background:rgba(38,198,160,.05)">
            <span style="font-size:5px;color:var(--teal)">${md?.icon||'?'} ${md?.name||installed} — ${md?.desc||''}</span>
            <button class="mini-btn red" style="font-size:4px" onclick="removeModule(${m.id},${si})">✕</button>
          </div>`;
        } else {
          html+=`<div style="font-size:5px;color:var(--text3);margin-bottom:4px;padding:4px;border:1px dashed var(--border)">Empty slot — install a module:</div>
          <div style="display:flex;gap:3px;margin-bottom:4px">`;
          for(const[modId,md]of Object.entries(MODULE_DEFS)){
            const have=G.inv[modId]||0;
            html+=`<button class="mini-btn ${have>0?'teal':'dim'}" style="flex:1;font-size:4px" onclick="installModule(${m.id},${si},'${modId}')" ${have>0?'':'disabled'}>${md.icon} ${md.name}<br><span style="color:var(--text3)">${have} avail</span></button>`;
          }
          html+=`</div>`;
        }
      }
      html+=`</div>`;
    }
  }

  // Tier upgrade
  if(UPGRADEABLE.includes(m.type)){
    const tier=m.tier||1;
    const TIER_COSTS={
      2:{iron_plate:10,iron_gear:5,circuit:2},
      3:{steel_plate:8,circuit:6,engine:2},
    };
    const TIER_BONUS={2:'1.5× speed & yield',3:'2× speed & yield'};
    if(tier<3){
      const nextTier=tier+1;
      const cost=TIER_COSTS[nextTier];
      const canAfford=Object.entries(cost).every(([k,v])=>(G.inv[k]||0)>=v);
      const costStr=Object.entries(cost).map(([k,v])=>{
        const have=G.inv[k]||0;
        const col=have>=v?'var(--green)':'var(--red)';
        return `${v}× ${ITEMS[k]?.name||k} <span style="color:${col}">(${have})</span>`;
      }).join(', ');
      html+=`<div style="border:1px solid var(--border);background:var(--bg3);padding:7px;margin-top:6px">
        <div style="font-size:5px;color:var(--text3);margin-bottom:3px">UPGRADE TO T${nextTier} — ${TIER_BONUS[nextTier]}</div>
        <div style="font-size:4px;color:var(--text3);margin-bottom:5px">${costStr}</div>
        <button class="mini-btn ${canAfford?'teal':'dim'}" onclick="upgradeMachine(${m.id})" ${canAfford?'':'disabled'}>⬆ UPGRADE</button>
      </div>`;
    } else {
      html+=`<div style="font-size:5px;color:var(--teal);padding:5px;border:1px solid var(--tealDim);margin-top:6px;text-align:center">T3 MAX TIER ✓</div>`;
    }
  }

  // Controls
  html+=`<div style="display:flex;gap:6px;margin-top:6px">
    <button class="mini-btn" style="flex:1;color:var(--text2);border-color:var(--border2)" onclick="toggleM(${m.id})">${m.active?'PAUSE':'RESUME'}</button>
    <button class="mini-btn red" style="flex:1" onclick="tryRemove(${m.x},${m.y})">REMOVE</button>
  </div>`;

  el.innerHTML=html;
}

function irow(lbl,val){return `<div class="irow"><span class="lbl">${lbl}</span><span>${val}</span></div>`}
function setRecipe(id,rid){const m=G.machines[id];if(!m)return;m.recipe=rid||null;m.prog=0;renderMachPanel();}
function toggleM(id){const m=G.machines[id];if(!m)return;m.active=!m.active;renderMachPanel();}
function rotateM(id){const m=G.machines[id];if(!m)return;m.dir=(m.dir+1)%4;renderMachPanel();toast(`Direction: ${D_ARR[m.dir]}`,'ok');}

function upgradeMachine(id){
  const m=G.machines[id]; if(!m)return;
  const tier=m.tier||1; if(tier>=3)return;
  const TIER_COSTS={
    2:{iron_plate:10,iron_gear:5,circuit:2},
    3:{steel_plate:8,circuit:6,engine:2},
  };
  const nextTier=tier+1;
  const cost=TIER_COSTS[nextTier];
  for(const[item,need]of Object.entries(cost)){
    if((G.inv[item]||0)<need){toast(`Need ${need}× ${ITEMS[item]?.name||item}`,'wrn');sfx('error');return;}
  }
  for(const[item,need]of Object.entries(cost)) G.inv[item]-=need;
  m.tier=nextTier;
  sfx('research');
  toast(`Upgraded to T${nextTier}!`,'ok');
  updateHUD(); renderMachPanel();
}

function installModule(machId,slot,modId){
  const m=G.machines[machId]; if(!m)return;
  if((G.inv[modId]||0)<1){toast('No modules available','wrn');return;}
  if(!m.modules)m.modules=[];
  G.inv[modId]--;
  m.modules[slot]=modId;
  sfx('craft'); toast(`${ITEMS[modId]?.name||modId} installed`,'ok');
  updateHUD(); renderMachPanel();
}

function removeModule(machId,slot){
  const m=G.machines[machId]; if(!m||!m.modules)return;
  const modId=m.modules[slot]; if(!modId)return;
  m.modules.splice(slot,1);
  G.inv[modId]=(G.inv[modId]||0)+1;
  sfx('craft'); toast('Module removed','ok');
  updateHUD(); renderMachPanel();
}

// ── Blueprint helpers ──────────────────────────────
function blueprintCost(data){
  const totals={};
  for(const e of data){
    const def=MDEFS[e.type]; if(!def||def.stub)continue;
    for(const[item,n]of Object.entries(def.cost))
      totals[item]=(totals[item]||0)+n;
  }
  return totals;
}
function blueprintCostStr(data){
  const c=blueprintCost(data);
  if(!Object.keys(c).length)return'Free';
  return Object.entries(c).map(([k,v])=>`${v}× ${ITEMS[k]?.name||k}`).join(', ');
}
function blueprintCanAfford(data){
  const c=blueprintCost(data);
  return Object.entries(c).every(([k,v])=>(G.inv[k]||0)>=v);
}
function saveBlueprintFromModal(){
  const name=(document.getElementById('bpNameInput')?.value||'Blueprint').trim()||'Blueprint';
  if(!G.blueprints)G.blueprints=[];
  if(G.blueprints.length>=8){toast('Blueprint limit reached (8)','wrn');closeModal();return;}
  G.blueprints.push({name, data:[...blueprintState.data]});
  blueprintState={mode:'idle',x1:0,y1:0,x2:0,y2:0,data:[]};
  saveGame(); closeModal(); sfx('craft');
  toast('Blueprint saved!','ok');
  if(openPanel==='blueprint')renderBlueprintPanel();
}
function startPasteBlueprint(idx){
  const b=(G.blueprints||[])[idx]; if(!b)return;
  if(!blueprintCanAfford(b.data)){
    const missing=Object.entries(blueprintCost(b.data))
      .filter(([k,v])=>(G.inv[k]||0)<v)
      .map(([k,v])=>`${v-(G.inv[k]||0)}× ${ITEMS[k]?.name||k}`).join(', ');
    toast(`Need: ${missing}`,'bad'); sfx('error'); return;
  }
  blueprintState={mode:'holding',x1:0,y1:0,x2:0,y2:0,data:[...b.data]};
  closePanel('blueprint');
  setTool('blueprint');
  toast('Tap map to place blueprint','ok');
}
function pasteBlueprintAt(data,x,y){
  const canPlace2=data.every(e=>{
    const def=MDEFS[e.type]; if(!def)return false;
    const[mw,mh]=def.size;
    for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++){
      const nx=x+e.rx+dx,ny=y+e.ry+dy;
      if(nx<0||ny<0||nx>=MAP_W||ny>=MAP_H)return false;
      if(G.map[ny][nx].mid!==null)return false;
    }
    return true;
  });
  if(!canPlace2){toast('Cannot place here — tiles occupied','bad');sfx('error');return;}
  if(!blueprintCanAfford(data)){toast('Not enough materials','bad');sfx('error');return;}
  const costs=blueprintCost(data);
  for(const[item,n]of Object.entries(costs)) G.inv[item]-=n;
  for(const e of data){
    const def=MDEFS[e.type]; if(!def||def.stub)continue;
    const m=mkMachine(e.type,x+e.rx,y+e.ry,e.dir);
    m.recipe=e.recipe; m.tier=e.tier||1;
    if(e.type==='miner')m.mineRes=G.map[y+e.ry][x+e.rx].res||null;
    G.machines[m.id]=m;
    const[mw,mh]=def.size;
    for(let dy=0;dy<mh;dy++)for(let dx=0;dx<mw;dx++)
      G.map[y+e.ry+dy][x+e.rx+dx].mid=m.id;
    G.stats.placed++;
  }
  blueprintState={mode:'idle',x1:0,y1:0,x2:0,y2:0,data:[]};
  updateHUD(); saveGame(); sfx('place');
  toast(`Placed ${data.length} machine${data.length!==1?'s':''}!`,'ok');
}
function deleteBlueprint(idx){
  if(!G.blueprints)return;
  G.blueprints.splice(idx,1);
  saveGame(); renderBlueprintPanel();
  toast('Blueprint deleted','ok');
}

function ejectBuf(id){
  const m=G.machines[id]; if(!m)return;
  const items=Object.entries(m.inBuf).filter(([,v])=>v>0);
  if(!items.length){toast('Nothing to return','wrn');return;}
  for(const[item,n]of items){G.inv[item]=(G.inv[item]||0)+n;m.inBuf[item]=0;}
  m.prog=0;
  sfx('craft'); toast('Inputs returned to inventory','ok');
  updateHUD(); renderMachPanel();
}

function feedCoal(id,amount){
  const m=G.machines[id]; if(!m)return;
  const have=G.inv.coal||0;
  const n=Math.min(amount,have);
  if(n<=0){toast('No coal in inventory','wrn');return;}
  G.inv.coal-=n;
  m.inBuf.coal=(m.inBuf.coal||0)+n;
  sfx('craft'); toast(`Fed ${n} coal`,'ok');
  updateHUD(); renderMachPanel();
}

function emptyOutput(id){
  const m=G.machines[id]; if(!m)return;
  const items=Object.entries(m.outBuf).filter(([,v])=>v>0);
  if(!items.length){toast('Output already empty','wrn');return;}
  for(const[item,n]of items){G.inv[item]=(G.inv[item]||0)+n;m.outBuf[item]=0;}
  sfx('craft'); toast('Output collected','ok');
  updateHUD(); renderMachPanel();
}

function chestCollectAll(id){
  const m=G.machines[id]; if(!m||m.type!=='chest')return;
  const items=Object.entries(m.chestInv).filter(([,v])=>v>0);
  if(!items.length){toast('Chest is empty','wrn');return;}
  for(const[item,n]of items){G.inv[item]=(G.inv[item]||0)+n;m.chestInv[item]=0;}
  sfx('craft'); toast('Chest collected','ok');
  updateHUD(); renderMachPanel();
}

function chestTakeOne(itemId,id){
  const m=G.machines[id]; if(!m||m.type!=='chest')return;
  const n=m.chestInv[itemId]||0; if(!n)return;
  m.chestInv[itemId]--;
  G.inv[itemId]=(G.inv[itemId]||0)+1;
  sfx('tap');
  updateHUD(); renderMachPanel();
}

function renderResPanel(){

    <div style="font-size:6px;color:var(--text2)">🗒️ ${fmt(G.inv.sci_red||0)} Field Notes &nbsp;&nbsp; 📋 ${fmt(G.inv.sci_green||0)} Circuit Diagrams${G.research.done.includes('electronics')?` &nbsp;&nbsp; 📘 ${fmt(G.inv.sci_blue||0)} Adv. Schematics`:''}</div>
  </div>`;

  const eras=[...new Set(Object.values(TECHS).map(t=>t.era))];
  for(const era of eras){
    html+=`<div style="font-size:5px;color:var(--text3);letter-spacing:2px;margin:10px 0 6px">── ${era} ──</div>`;
    for(const[id,tech]of Object.entries(TECHS)){
      if(tech.era!==era)continue;
      const done=G.research.done.includes(id);
      const reqMet=tech.req.every(r=>G.research.done.includes(r));
      const canAfford=reqMet&&!done&&Object.entries(tech.cost).every(([k,v])=>(G.inv[k]||0)>=v);
      const costStr=Object.entries(tech.cost).map(([k,v])=>`${v}×${ITEMS[k]?.name||k}`).join(', ');
      html+=`<div class="tech-card ${done?'done':reqMet?'avail':'locked'}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:6px;color:${done?'var(--teal)':'var(--text)'}">${tech.icon} ${tech.name}</span>
          ${done?'<span style="color:var(--teal);font-size:9px">✓</span>':''}
          ${!reqMet&&!done?'<span style="color:var(--text3);font-size:9px">🔒</span>':''}
        </div>
        <div style="font-size:5px;color:var(--text3);margin-bottom:5px">${tech.desc}</div>
        ${!done?`<div style="font-size:5px;color:var(--amber);margin-bottom:5px">Cost: ${costStr}</div>`:''}
        ${!done&&reqMet?`<button class="mini-btn ${canAfford?'amber':'dim'}" onclick="doResearch('${id}')" ${canAfford?'':'disabled'}>RESEARCH</button>`:''}
      </div>`;
    }
  }
  el.innerHTML=html;
}

function doResearch(id){
  const tech=TECHS[id]; if(!tech||G.research.done.includes(id))return;
  if(!tech.req.every(r=>G.research.done.includes(r))){toast('Prerequisites not met','wrn');sfx('error');return;}
  for(const[k,v]of Object.entries(tech.cost)){
    if((G.inv[k]||0)<v){toast(`Need ${v}× ${ITEMS[k]?.name||k}`,'wrn');sfx('error');return;}
  }
  for(const[k,v]of Object.entries(tech.cost))G.inv[k]-=v;
  G.research.done.push(id);
  buildToolbar(); renderResPanel(); updateHUD(); saveGame(); sfx('research');
  toast(`✓ ${tech.name} researched!`,'ok');
}

// ── Statistics & Bottleneck Detector ──────────────
function renderStatsPanel(){
  const el=document.getElementById('pStatsBody'); if(!el)return;
  const machines=Object.values(G.machines);
  const producers=machines.filter(m=>!['belt','inserter','chest'].includes(m.type));
  const active=producers.filter(m=>m.active);
  const paused=producers.filter(m=>!m.active);
  const typeCounts={};
  for(const m of machines) typeCounts[m.type]=(typeCounts[m.type]||0)+1;
  const pwrFree=G.power.out-G.power.in;
  const pwrRatio=G.power.in>0?Math.min(1,G.power.out/G.power.in):1;
  const pwrPct=Math.round(pwrRatio*100);
  const pwrCol2=pwrFree<0?'var(--red)':pwrFree<G.power.in*.2?'var(--amber)':'var(--green)';

  const allPaused=producers.length>0&&producers.every(m=>!m.active);
  const allActive=producers.length>0&&producers.every(m=>m.active);
  let html=`<div class="card" style="margin-bottom:10px">
    <span class="sec-label">OVERVIEW</span>
    ${irow('Machines placed',`<span style="color:var(--amber)">${machines.length}</span>`)}
    ${irow('Producers active',`<span style="color:var(--green)">${active.length}</span> / ${producers.length}`)}
    ${paused.length?irow('Paused',`<span style="color:var(--text3)">${paused.length}</span>`):''}
    ${irow('Taps',`<span style="color:var(--text2)">${G.stats.taps}</span>`)}
    ${irow('Research',`<span style="color:var(--text2)">${G.research.done.length}/${Object.keys(TECHS).length}</span>`)}
    <div style="display:flex;gap:5px;margin-top:8px">
      <button class="mini-btn ${allPaused?'dim':'amber'}" style="flex:1" onclick="pauseAllMachines()" ${allPaused?'disabled':''}>⏸ PAUSE ALL</button>
      <button class="mini-btn ${allActive?'dim':'teal'}" style="flex:1" onclick="resumeAllMachines()" ${allActive?'disabled':''}>▶ RESUME ALL</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:10px">
    <span class="sec-label">⚡ POWER</span>
    ${irow('Generating',`<span style="color:var(--green)">${fmt(G.power.out)} kW</span>`)}
    ${irow('Consuming',`<span style="color:var(--amber)">${fmt(G.power.in)} kW</span>`)}
    ${irow('Free capacity',`<span style="color:${pwrCol2}">${pwrFree>=0?'+':''}${fmt(pwrFree)} kW</span>`)}
    ${G.power.in>0?irow('Load',`<span style="color:${pwrCol2}">${pwrPct}%</span>`):''}
    <div class="prog-wrap" style="margin-top:4px"><div class="prog-fill ${pwrFree<0?'amber':'green'}" style="width:${Math.min(100,pwrPct)}%"></div></div>
  </div>`;

  if(Object.keys(typeCounts).length){
    html+=`<div class="card" style="margin-bottom:10px"><span class="sec-label">MACHINE COUNT</span>`;
    for(const[type,count]of Object.entries(typeCounts)){
      const def=MDEFS[type];
      html+=`<div style="display:flex;justify-content:space-between;font-size:5px;margin-bottom:4px">
        <span style="color:var(--text2)">${def?.icon||''} ${def?.name||type}</span>
        <span style="color:var(--amber)">${count}</span>
      </div>`;
    }
    html+=`</div>`;
  }

  // Bottleneck analysis
  const issues=[];
  const gridRatio=powerRatio();
  for(const m of producers){
    if(!m.active) continue;
    const def=MDEFS[m.type];
    if(m.type==='generator'||m.type==='burner'){
      if((m.inBuf.coal||0)===0) issues.push({m,status:'nofuel'});
      continue;
    }
    if(m.type==='stone_furnace'||m.type==='blast_furnace'){
      // Coal-fuelled furnaces — warn if no coal in buf
      if((m.inBuf.coal||0)===0) issues.push({m,status:'nofuel'});
      if(Object.values(m.outBuf).reduce((a,b)=>a+b,0)>=50) issues.push({m,status:'stalled'});
      continue;
    }
    if(m.type==='miner'){
      if(def.power>0&&gridRatio===0){issues.push({m,status:'nopower'});continue;}
      if(Object.values(m.outBuf).reduce((a,b)=>a+b,0)>=50) issues.push({m,status:'stalled'});
      continue;
    }
    if(!def.recipes.length) continue;
    if(def.power>0&&gridRatio===0){issues.push({m,status:'nopower'});continue;}
    if(!m.recipe){issues.push({m,status:'norecipe'});continue;}
    const rec=RECIPES[m.recipe]; if(!rec) continue;
    if(Object.values(m.outBuf).reduce((a,b)=>a+b,0)>=50){issues.push({m,status:'stalled'});continue;}
    if(Object.keys(rec.in).every(k=>(m.inBuf[k]||0)===0)&&m.prog===0) issues.push({m,status:'starved'});
  }

  const statusMeta={
    stalled:  {label:'OUTPUT FULL', col:'var(--red)',   tip:'outBuf at cap — drain it or add an inserter'},
    starved:  {label:'INPUT EMPTY', col:'var(--amber)', tip:'No items arriving in inBuf'},
    norecipe: {label:'NO RECIPE',   col:'var(--text3)', tip:'Open machine panel to assign a recipe'},
    nopower:  {label:'NO POWER',    col:'var(--red)',   tip:'No generators running — place a Burner or Generator'},
    nofuel:   {label:'NO COAL',     col:'var(--amber)', tip:'No coal — feed coal via inserter or machine panel'},
  };

  html+=`<span class="sec-label" style="color:${issues.length?'var(--red)':'var(--teal)'}">`;
  html+=issues.length?`BOTTLENECKS (${issues.length} issue${issues.length>1?'s':''})` : 'BOTTLENECKS ✓ NONE';
  html+=`</span>`;

  if(!machines.length){
    html+=`<div style="font-size:5px;color:var(--text3);padding:10px;border:1px solid var(--border);text-align:center;line-height:2.2">No machines placed yet.</div>`;
  } else if(!issues.length){
    html+=`<div style="font-size:5px;color:var(--teal);padding:8px;border:1px solid var(--tealDim);background:rgba(38,198,160,.05);margin-bottom:8px;line-height:2">All active machines running.<br>Factory looks healthy!</div>`;
  } else {
    for(const{m,status}of issues){
      const def=MDEFS[m.type];
      const s=statusMeta[status];
      html+=`<div class="stat-machine ${status}" onclick="selectMachineById(${m.id})" style="cursor:pointer">
        <div style="flex:1">
          <div style="color:var(--text);margin-bottom:2px">${def.icon} ${def.name} <span style="color:var(--text3)">#${m.id}</span></div>
          <div style="color:var(--text3);line-height:1.8">${s.tip}</div>
        </div>
        <span style="color:${s.col};text-align:right;flex-shrink:0;margin-left:8px;font-size:4px">${s.label}</span>
      </div>`;
    }
  }

  // Production rates
  const ratable=producers.filter(m=>m.active&&m.recipe&&m.type!=='generator');
  const miners=machines.filter(m=>m.type==='miner'&&m.active&&m.mineRes);
  if(ratable.length||miners.length){
    html+=`<div style="margin-top:12px"><span class="sec-label">PRODUCTION RATES</span>`;
    const rateRow=(icon,label,sub,rate)=>{
      const col=rate===0?'var(--text3)':rate<2?'var(--amber)':'var(--green)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;font-size:5px;padding:5px 0;border-bottom:1px solid var(--border)">
        <div><span style="color:var(--text2)">${icon} ${label}</span><span style="color:var(--text3);display:block;margin-top:1px">${sub}</span></div>
        <span style="color:${col};flex-shrink:0;margin-left:8px">${rate}/min</span>
      </div>`;
    };
    for(const m of miners){
      html+=rateRow('⛏️','Miner',ITEMS[m.mineRes]?.name||m.mineRes,itemsPerMin(m));
    }
    for(const m of ratable){
      const def=MDEFS[m.type];
      const rec=RECIPES[m.recipe];
      const outName=rec?Object.keys(rec.out).map(k=>ITEMS[k]?.name||k).join(', '):'?';
      html+=rateRow(def.icon,def.name,outName,itemsPerMin(m));
    }
    html+=`</div>`;
  }

  if(paused.length){
    html+=`<div style="margin-top:10px;font-size:5px;color:var(--text3);padding:6px;border:1px solid var(--border)">
      ⏸ ${paused.length} machine${paused.length>1?'s':''} paused
    </div>`;
  }

  el.innerHTML=html;
}

function multiselStartMove(){
  const ms=multiselState; if(!ms.ids.length)return;
  // Use centre of bounding box as anchor
  const machines=ms.ids.map(id=>G.machines[id]).filter(Boolean);
  const minX=Math.min(...machines.map(m=>m.x));
  const minY=Math.min(...machines.map(m=>m.y));
  ms.anchorX=minX; ms.anchorY=minY;
  ms.mode='moving';
  const btn=document.getElementById('multiselMoveBtn');
  if(btn){btn.style.background='rgba(38,198,160,.2)';btn.textContent='✥ TAP DEST';}
  toast('Tap the map to move selection there','ok');
}
function multiselDemolish(){
  const ms=multiselState; if(!ms.ids.length)return;
  for(const id of ms.ids){
    const m=G.machines[id]; if(!m)continue;
    tryRemove(m.x,m.y);
  }
  ms.ids=[]; ms.mode='idle';
  document.getElementById('multiselBar')?.classList.add('hidden');
  setTool('select');
  toast('Selection demolished','ok');
}
function multiselRotate(){
  const ms=multiselState; if(!ms.ids.length)return;
  for(const id of ms.ids){
    const m=G.machines[id]; if(!m)continue;
    m.dir=(m.dir+1)%4;
  }
  saveGame(); sfx('place');
  toast(`Rotated ${ms.ids.length} machine${ms.ids.length>1?'s':''}`, 'ok');
}
function multiselClear(){
  multiselState={mode:'idle',x1:0,y1:0,x2:0,y2:0,ids:[]};
  document.getElementById('multiselBar')?.classList.add('hidden');
  setTool('select');
}
function pauseAllMachines(){
  for(const m of Object.values(G.machines)){
    if(m.type!=='belt'&&m.type!=='inserter'&&m.type!=='chest') m.active=false;
  }
  saveGame(); renderStatsPanel(); updateHUD(); toast('All machines paused','ok');
}
function resumeAllMachines(){
  for(const m of Object.values(G.machines)){
    if(m.type!=='belt'&&m.type!=='inserter'&&m.type!=='chest') m.active=true;
  }
  saveGame(); renderStatsPanel(); updateHUD(); toast('All machines resumed','ok');
}
function selectMachineById(id){
  const m=G.machines[id]; if(!m)return;
  const def=MDEFS[m.type];
  const[mw,mh]=def.size;
  const ts=TILE*G.cam.zoom;
  G.cam.x=(m.x+mw/2)*ts - canvas.width/2;
  G.cam.y=(m.y+mh/2)*ts - canvas.height/2;
  clampCam();
  closePanel('stats');
  openMachinePanel(m);
}

function checkAchievements(){
  if(!G.achievements)G.achievements=[];
  const earned=new Set(G.achievements);
  const machines=Object.values(G.machines);
  const totalOre=(G.inv.iron_ore||0)+(G.inv.copper_ore||0)+(G.inv.coal||0)+(G.inv.stone||0)+G.stats.taps;

  const checks={
    first_ore:    ()=>G.stats.taps>=1,
    ore_100:      ()=>G.stats.taps>=100,
    ore_1000:     ()=>G.stats.taps>=1000,
    first_miner:  ()=>machines.some(m=>m.type==='miner'),
    miners_5:     ()=>machines.filter(m=>m.type==='miner'&&m.active).length>=5,
    first_machine:()=>G.stats.placed>=1,
    first_belt:   ()=>machines.some(m=>m.type==='belt'),
    first_insert: ()=>machines.some(m=>m.type==='inserter'),
    first_circuit:()=>(G.inv.circuit||0)>=1,
    first_steel:  ()=>(G.inv.steel_plate||0)>=1,
    machines_10:  ()=>machines.length>=10,
    machines_25:  ()=>machines.length>=25,
    first_power:  ()=>G.power.out>0,
    power_60:     ()=>G.power.out>=60,
    power_120:    ()=>G.power.out>=120,
    first_notes:  ()=>(G.inv.sci_red||0)>=1,
    first_diagrams:()=>(G.inv.sci_green||0)>=1,
    first_schematics:()=>(G.inv.sci_blue||0)>=1,
    automation:   ()=>G.research.done.includes('automation'),
    all_research: ()=>Object.keys(TECHS).every(id=>G.research.done.includes(id)),
    first_steel_r:()=>(G.inv.steel_plate||0)>=1,
    rocket_part:  ()=>ROCKET_PARTS.some(p=>(G.inv[p.id]||0)>=1),
    launch:       ()=>G.stats.launched===true,
    first_chest:  ()=>machines.some(m=>m.type==='chest'),
    first_splitter:()=>machines.some(m=>m.type==='splitter'),
    first_tunnel: ()=>machines.some(m=>m.type==='tunnel'),
    first_generator:()=>machines.some(m=>m.type==='generator'),
    first_blueprint:()=>(G.blueprints||[]).length>=1,
    logistics_research:()=>G.research.done.includes('logistics'),
    first_schematic:()=>(G.inv.sci_blue||0)>=1,
    machines_50:  ()=>machines.length>=50,
    power_240:    ()=>G.power.out>=240,
    first_module: ()=>machines.some(m=>(m.modules||[]).length>0),
    first_upgrade:()=>machines.some(m=>(m.tier||1)>=2),
  };

  let anyNew=false;
  for(const[id,fn]of Object.entries(checks)){
    if(!earned.has(id)&&fn()){
      G.achievements.push(id);
      earned.add(id);
      anyNew=true;
      const ach=ACHIEVEMENTS.find(a=>a.id===id);
      if(ach){
        // Achievement toast — styled differently from normal toasts
        const c=document.getElementById('toasts');
        const el=document.createElement('div');
        el.className='toast';
        el.style.cssText='border-color:#f5a623;color:#f5a623;background:#1a1400;min-width:160px;text-align:center';
        el.innerHTML=`${ach.icon} ${ach.name}<br><span style="font-size:4px;color:#999">${ach.desc}</span>`;
        c.appendChild(el);
        setTimeout(()=>el.remove(),3500);
        sfx('research');
      }
    }
  }
  if(anyNew)saveGame();
}

function renderRecipesPanel(){
  const el=document.getElementById('pRecipesBody'); if(!el)return;
  const done=new Set(G.research.done);
  // Group recipes by machine
  const machineGroups={};
  for(const[rid,rec]of Object.entries(RECIPES)){
    const mid=rec.machine;
    if(!machineGroups[mid])machineGroups[mid]=[];
    machineGroups[mid].push({id:rid,...rec});
  }
  // Also add hand crafts
  machineGroups['hand']=HAND_CRAFTS.map(hc=>({id:hc.id,name:hc.name,machine:'hand',time:hc.clicks*0.5,in:hc.in,out:hc.out,unlock:hc.unlock}));

  const machOrder=['hand','stone_furnace','blast_furnace','electric_smelter','assembler','lab'];
  const machLabels={hand:'✋ Hand Craft',stone_furnace:'⚱️ Stone Furnace',blast_furnace:'🔥 Blast Furnace',electric_smelter:'🌩️ Electric Smelter',assembler:'🏗️ Assembler',lab:'🔬 Research Lab'};
  let html='';
  for(const mid of machOrder){
    const recipes=machineGroups[mid]; if(!recipes||!recipes.length)continue;
    const mdef=MDEFS[mid];
    const machUnlocked=!mdef?.unlock||done.has(mdef.unlock);
    html+=`<div style="font-size:6px;color:var(--amber);letter-spacing:2px;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)">${machLabels[mid]||mid}</div>`;
    for(const r of recipes){
      const recUnlocked=!r.unlock||done.has(r.unlock);
      const visible=mid==='hand'?recUnlocked:machUnlocked&&recUnlocked;
      const ins=Object.entries(r.in).map(([k,v])=>`${v}× ${ITEMS[k]?.icon||''}${ITEMS[k]?.name||k}`).join(' + ');
      const outs=Object.entries(r.out).map(([k,v])=>`${v}× ${ITEMS[k]?.icon||''}${ITEMS[k]?.name||k}`).join(' + ');
      if(!visible){
        html+=`<div style="padding:6px 8px;margin-bottom:3px;border:1px solid var(--border);background:var(--bg3);opacity:0.4">
          <span style="font-size:6px;color:var(--text3)">🔒 Locked${r.unlock?` — requires ${TECHS[r.unlock]?.name||r.unlock}`:''}</span>
        </div>`;
      } else {
        html+=`<div style="padding:7px 8px;margin-bottom:4px;border:1px solid var(--border2);background:var(--bg3)">
          <div style="font-size:7px;color:var(--text);margin-bottom:4px">${r.name}</div>
          <div style="font-size:6px;color:var(--blue);margin-bottom:2px">In: ${ins}</div>
          <div style="font-size:6px;color:var(--amber)">→ ${outs}</div>
          ${mid!=='hand'?`<div style="font-size:6px;color:var(--text3);margin-top:2px">⏱ ${r.time}s</div>`:''}
        </div>`;
      }
    }
  }
  if(!html)html='<div style="font-size:6px;color:var(--text3);text-align:center;padding:12px">No recipes yet.</div>';
  el.innerHTML=html;
}
