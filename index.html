function tickTutorial(){
  if(!G.tutorial)G.tutorial={step:0};
  const t=G.tutorial;
  if(t.step<0)return; // complete or skipped

  // Find current step
  const stepIdx=t.step; // 0-based index into TUTORIAL_STEPS
  if(stepIdx>=TUTORIAL_STEPS.length){
    t.step=-1;
    hideTutHint();
    return;
  }
  const step=TUTORIAL_STEPS[stepIdx];

  // Check if current step is done
  if(step.done()){
    t.step++;
    if(t.step>=TUTORIAL_STEPS.length){
      t.step=-1;
      hideTutHint();
      showModal('🚀 TUTORIAL COMPLETE',
        `<div style="font-size:8px;color:var(--amber);margin-bottom:12px;text-align:center">The Factory Must Grow</div>
         <div style="font-size:6px;color:var(--text2);line-height:2.4;margin-bottom:10px">
           You've learned the basics of 8-BIT INDUSTRY.<br><br>
           Your goal: build a <span style="color:var(--amber)">🚀 Rocket</span> and see what awaits in this universe.<br><br>
           <span style="color:var(--text3)">Research new technologies, automate everything, and expand your factory until launch day.</span>
         </div>`,
        `<button class="btn btn-sm" onclick="closeModal();sfx('research')">THE FACTORY MUST GROW ▶</button>`
      );
      sfx('research');
      return;
    }
  }

  // Show hint for current step
  if(t.step>=0&&t.step<TUTORIAL_STEPS.length){
    showTutHint(TUTORIAL_STEPS[t.step]);
  }
}

function showTutHint(step){
  const el=document.getElementById('tutHint');
  const tx=document.getElementById('tutText');
  if(!el||!tx)return;
  tx.innerHTML=step.render?step.render():step.text;
  el.classList.remove('hidden');
}
function hideTutHint(){
  document.getElementById('tutHint')?.classList.add('hidden');
}
function skipTutorial(){
  if(G.tutorial)G.tutorial.step=-1;
  hideTutHint();
  toast('Tutorial skipped','ok');
}

function buyPerk(id,cost){
  if((G.perks.points||0)<cost){toast('Not enough perk points','wrn');return;}
  G.perks.points-=cost;
  if(!G.perks.spent)G.perks.spent={};
  G.perks.spent[id]=true;
  saveGame(); sfx('research');
  toast(`Perk unlocked: ${id}`,'ok');
  renderPerksPanel();
}

// ═══════════════════════════════════════════════════
//  TOAST / MODAL
// ═══════════════════════════════════════════════════
function toast(msg,type=''){
  const c=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  c.appendChild(el); setTimeout(()=>el.remove(),2100);
}
function showModal(title,body,foot){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mFoot').innerHTML=foot||'';
  document.getElementById('mOverlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('mOverlay').classList.add('hidden')}

function openMenu(){
  const devBtn=G.devMode
    ?`<button class="btn btn-sm" style="border-color:var(--purple);color:var(--purple)" onclick="closeModal();togglePanel('dev')">🛠 DEV</button>`
    :`<button class="btn btn-sm" style="border-color:var(--border);color:var(--text3)" onclick="promptDevUnlock()">🔒 DEV</button>`;

  // Audio settings
  let audioHtml=`<div style="margin-top:10px"><span class="sec-label">AUDIO</span>
    <div style="display:flex;gap:8px;margin-top:6px">
      <div style="flex:1;display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg3);border:1px solid var(--border)">
        <span style="font-size:6px;color:var(--text2)">🔊 Sound FX</span>
        <button class="mini-btn ${G.sfx?'teal':'dim'}" onclick="toggleSfxMenu()">${G.sfx?'ON':'OFF'}</button>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg3);border:1px solid var(--border)">
        <span style="font-size:6px;color:var(--text2)">🎵 Music</span>
        <button class="mini-btn ${G.music?'teal':'dim'}" onclick="toggleMusic()">${G.music?'ON':'OFF'}</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border)">
      <span style="font-size:6px;color:var(--text2);flex-shrink:0">🔉 Vol</span>
      <input id="musicVolSlider" type="range" min="0" max="1" step="0.05" value="${G.musicVol!==undefined?G.musicVol:0.7}"
        oninput="setMusicVol(this.value)"
        style="flex:1;accent-color:var(--amber);cursor:pointer">
      <span id="musicVolLabel" style="font-size:6px;color:var(--amber);min-width:28px;text-align:right">${Math.round((G.musicVol!==undefined?G.musicVol:0.7)*100)}%</span>
    </div>
  </div>`;
  let slotsHtml='<div style="margin-top:10px"><span class="sec-label">SAVE SLOTS</span>';
  for(let s=1;s<=3;s++){
    const raw=localStorage.getItem(`ebi_save_slot${s}`);
    let slotInfo='<span style="color:var(--text3)">Empty</span>';
    if(raw){
      try{
        const d=JSON.parse(raw);
        const ts=d._savedAt?new Date(d._savedAt).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'?';
        const launched=d.stats?.launched?'🚀 ':'';
        const research=d.research?.done?.length||0;
        slotInfo=`<span style="color:var(--text2)">${launched}T:${d.stats?.taps||0} R:${research}/${Object.keys(TECHS).length} &nbsp;<span style="color:var(--text3);font-size:4px">${ts}</span></span>`;
      }catch(e){}
    }
    slotsHtml+=`
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:5px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border)">
      <span style="font-size:6px;color:var(--amber);min-width:16px">S${s}</span>
      <span style="font-size:5px;flex:1">${slotInfo}</span>
      <button class="mini-btn teal" onclick="saveToSlot(${s})" style="font-size:4px">SAVE</button>
      ${raw?`<button class="mini-btn amber" onclick="loadFromSlot(${s})" style="font-size:4px">LOAD</button>`:''}
      ${raw?`<button class="mini-btn dim" onclick="deleteSlot(${s})" style="font-size:4px">✕</button>`:''}
    </div>`;
  }
  slotsHtml+='</div>';

  showModal('☰ MENU',
    `<div style="font-size:6px;color:var(--text2);line-height:2.4">
      Zone 1: Ironfield<br>
      Taps: ${G.stats.taps} &nbsp;·&nbsp; Machines placed: ${G.stats.placed}<br>
      Power: ${fmt(G.power.out)}kW out / ${fmt(G.power.in)}kW in<br>
      Research: ${G.research.done.length} / ${Object.keys(TECHS).length}<br>
      Perk points: ${G.perks?.points||0}<br>
      Launched: ${G.stats.launched?'✓ Yes':'Not yet'}
    </div>${audioHtml}${slotsHtml}`,
    `<button class="btn btn-teal btn-sm" onclick="closeModal()">RESUME</button>
     ${devBtn}
     <button class="btn btn-sm btn-red" onclick="quitToTitle()">QUIT</button>`
  );
}

function saveToSlot(s){
  try{
    G._savedAt=Date.now();
    localStorage.setItem(`ebi_save_slot${s}`,JSON.stringify(G));
    toast(`Saved to slot ${s}`,'ok'); sfx('craft');
    openMenu(); // refresh to show updated slot info
  }catch(e){toast('Save failed','bad');}
}

function loadFromSlot(s){
  const raw=localStorage.getItem(`ebi_save_slot${s}`);
  if(!raw){toast('Slot empty','wrn');return;}
  try{
    G=JSON.parse(raw);
    if(!G.crafted)G.crafted={};
    if(!G.perks)G.perks={points:0,spent:{}};
    if(!G.achievements)G.achievements=[];
    if(!G.tutorial)G.tutorial={step:0};
    if(!G.blueprints)G.blueprints=[];
    G.power={out:0,in:0};
    if(document.getElementById('modal')&&!document.getElementById('modal').classList.contains('hidden'))closeModal();
    startGame(false);
    toast(`Loaded slot ${s}`,'ok');
  }catch(e){toast('Load failed','bad');}
}

function deleteSlot(s){
  localStorage.removeItem(`ebi_save_slot${s}`);
  toast(`Slot ${s} deleted`,'ok');
  openMenu();
}

function promptDevUnlock(){
  closeModal();
  showModal('🔒 DEV UNLOCK',
    `<div style="font-size:6px;color:var(--text2);line-height:2;margin-bottom:10px">Enter the dev code:</div>
     <input id="devCodeInput" type="text" autocomplete="off" style="width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:8px;padding:10px;letter-spacing:4px" placeholder="_ _ _ _" maxlength="12">`,
    `<button class="btn btn-sm" onclick="checkDevCode()">UNLOCK</button>
     <button class="btn btn-sm" onclick="closeModal()">CANCEL</button>`
  );
  setTimeout(()=>document.getElementById('devCodeInput')?.focus(),100);
}

function checkDevCode(){
  const code=(document.getElementById('devCodeInput')?.value||'').toUpperCase().trim();
  if(code==='BIGBANG'){
    G.devMode=true;
    document.getElementById('btnDev').style.display='';
    saveGame(); closeModal();
    toast('🛠 Dev mode ON','ok');
  } else if(code==='BIGBANGOFF'){
    G.devMode=false;
    document.getElementById('btnDev').style.display='none';
    if(openPanel==='dev')closePanel('dev');
    saveGame(); closeModal();
    toast('Dev mode OFF','');
  } else {
    toast('Wrong code','bad');
  }
}

// ── Dev Panel ──────────────────────────────────────
const DEV_GIVE_AMOUNTS = {
  iron_ore:500, copper_ore:500, coal:200, stone:200,
  iron_plate:200, copper_plate:200, steel_plate:100,
  iron_gear:100, copper_wire:200, iron_rod:100,
  circuit:50, engine:20,
  sci_red:50, sci_green:50, sci_blue:30,
};

function renderDevPanel(){
  const el=document.getElementById('pDevBody'); if(!el)return;
  const tickSpeed=G.devTickSpeed||1;
  let html=`<div style="padding:6px 8px;background:rgba(171,71,188,.1);border:1px solid var(--purple);margin-bottom:10px;font-size:5px;color:var(--purple)">
    DEV MODE ACTIVE — not for normal play
  </div>`;

  // Tick speed
  html+=`<span class="sec-label" style="color:var(--purple)">SIMULATION</span>
  <div style="display:flex;gap:4px;margin-bottom:10px">
    ${[1,4,10,20].map(s=>`<button class="mini-btn ${tickSpeed===s?'amber':''}" onclick="setDevSpeed(${s})" style="${tickSpeed===s?'border-color:var(--amber);color:var(--amber)':''}">×${s}</button>`).join('')}
  </div>`;

  // Free crafting toggle
  html+=`<span class="sec-label" style="color:var(--purple)">CRAFTING</span>
  <div style="margin-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:6px;color:var(--text2)">Free crafting</span>
      <button class="mini-btn ${G.devFreeCraft?'amber':'dim'}" onclick="toggleDevFreeCraft()">${G.devFreeCraft?'ON':'OFF'}</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:6px;color:var(--text2)">Free building</span>
      <button class="mini-btn ${G.devFreeBuild?'amber':'dim'}" onclick="toggleDevFreeBuild()">${G.devFreeBuild?'ON':'OFF'}</button>
    </div>
  </div>`;

  // Unlock all research
  html+=`<span class="sec-label" style="color:var(--purple)">RESEARCH</span>
  <div style="margin-bottom:10px">
    <button class="full-btn" style="border-color:var(--purple);color:var(--purple)" onclick="devUnlockAll()">UNLOCK ALL TECHS</button>
  </div>`;

  // Give resources
  html+=`<span class="sec-label" style="color:var(--purple)">GIVE RESOURCES</span>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px">`;
  for(const[item,amt]of Object.entries(DEV_GIVE_AMOUNTS)){
    html+=`<button class="mini-btn" style="font-size:4px;text-align:left;padding:5px 6px;border-color:var(--border2)" onclick="devGive('${item}',${amt})">
      +${amt} ${ITEMS[item]?.name||item}

  }

function setDevSpeed(s){
  G.devTickSpeed=s;
  clearInterval(tickId);
  tickId=setInterval(gameTick, Math.round(TICK_MS/s));
  renderDevPanel();
  toast(`Sim speed ×${s}`,'ok');
}

function toggleDevFreeCraft(){
  G.devFreeCraft=!G.devFreeCraft;
  renderDevPanel();
  toast(`Free crafting ${G.devFreeCraft?'ON':'OFF'}`,G.devFreeCraft?'ok':'');
}

function toggleDevFreeBuild(){
  G.devFreeBuild=!G.devFreeBuild;
  renderDevPanel();
  toast(`Free building ${G.devFreeBuild?'ON':'OFF'}`,G.devFreeBuild?'ok':'');
}

function devUnlockAll(){
  for(const id of Object.keys(TECHS))
    if(!G.research.done.includes(id))G.research.done.push(id);
  buildToolbar(); renderDevPanel();
  toast('All techs unlocked','ok');
}

function devGive(item,amt){
  G.inv[item]=(G.inv[item]||0)+amt;
  updateHUD();
  toast(`+${amt} ${ITEMS[item]?.name||item}`,'ok');
}

function devGiveAll(){
  for(const[item,amt]of Object.entries(DEV_GIVE_AMOUNTS))
    G.inv[item]=(G.inv[item]||0)+500;
  updateHUD(); toast('All resources +500','ok');
}

function devCompleteRocket(){
  if(!G.research.done.includes('rocket_tech'))G.research.done.push('rocket_tech');
  for(const p of ROCKET_PARTS) G.inv[p.id]=(G.inv[p.id]||0)+p.need;
  buildToolbar(); updateHUD();
  toast('Rocket components given','ok');
}

function devReset(){
  showModal('RESET SAVE?',
    '<div style="font-size:6px;color:var(--red)">This will wipe everything and start a new game.</div>',
    `<button class="btn btn-sm btn-red" onclick="localStorage.removeItem('${SAVE_KEY}');location.reload()">RESET</button>
     <button class="btn btn-sm" onclick="closeModal()">CANCEL</button>`
  );
}
function buildTitleSlots(){
  const el=document.getElementById('titleSlots'); if(!el)return;
  const slots=[];

  // Autosave slot
  const auto=localStorage.getItem(SAVE_KEY);
  if(auto){
    try{
      const d=JSON.parse(auto);
      const ts=d._savedAt?new Date(d._savedAt).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
      const launched=d.stats?.launched?'🚀 ':'';
      const research=d.research?.done?.length||0;
      slots.push({label:'AUTO',info:`${launched}Taps ${d.stats?.taps||0} · Research ${research}/${Object.keys(TECHS).length}`,time:ts,load:'continueGame()',del:`localStorage.removeItem('${SAVE_KEY}');buildTitleSlots()`});
    }catch(e){}
  }

  // Manual slots
  for(let s=1;s<=3;s++){
    const raw=localStorage.getItem(`ebi_save_slot${s}`);
    if(raw){
      try{
        const d=JSON.parse(raw);
        const ts=d._savedAt?new Date(d._savedAt).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
        const launched=d.stats?.launched?'🚀 ':'';
        const research=d.research?.done?.length||0;
        slots.push({label:`S${s}`,info:`${launched}Taps ${d.stats?.taps||0} · Research ${research}/${Object.keys(TECHS).length}`,time:ts,load:`loadFromSlot(${s})`,del:`deleteSlotTitle(${s})`});
      }catch(e){}
    }
  }

  if(!slots.length){el.innerHTML='';return;}

  let html='';
  for(const slot of slots){
    html+=`<div style="display:flex;align-items:center;gap:6px;padding:8px 10px;margin-bottom:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px">
      <span style="font-size:7px;color:var(--amber);min-width:32px;font-family:var(--font)">${slot.label}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:6px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${slot.info}</div>
        <div style="font-size:5px;color:var(--text3)">${slot.time}</div>
      </div>
      <button class="btn btn-teal btn-sm" style="font-size:5px;padding:4px 8px" onclick="${slot.load}">LOAD</button>
      <button class="btn btn-sm" style="font-size:5px;padding:4px 6px;color:var(--text3)" onclick="${slot.del}">✕</button>
    </div>`;
  }
  el.innerHTML=html;
}

function deleteSlotTitle(s){
  localStorage.removeItem(`ebi_save_slot${s}`);
  buildTitleSlots();
}
function quitToTitle(){
  musicStop();
  saveGame(); closeModal();
  clearInterval(tickId); cancelAnimationFrame(rafId);
  rafId=null; tickId=null;
  document.getElementById('sGame').classList.add('hidden');
  document.getElementById('sTitle').classList.remove('hidden');
  buildTitleSlots();
}

// ═══════════════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════════════
function saveGame(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch(e){}
}
function continueGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw){newGame();return;}
    G=JSON.parse(raw);
    if(!G||!G.ver){newGame();return;}
    if(!G.crafted)G.crafted={};
    if(!G.perks)G.perks={points:0,spent:{}};
    if(!G.achievements)G.achievements=[];
    if(!G.tutorial)G.tutorial={step:0};
    if(!G.blueprints)G.blueprints=[];
    // Always reset power on load — first gameTick() recalculates correctly.
    // Stale saved values would let machines run through powerRatio() checks
    // until the next tick, which could be 250ms after load.
    G.power={out:0,in:0};
    startGame(false);
  }catch(e){newGame();}
}

// ═══════════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════════
function newGame(){
  G=defaultState();
  startGame(true);
}

function startGame(isNew){
  document.getElementById('sTitle').classList.add('hidden');
  document.getElementById('sGame').classList.remove('hidden');
  initCanvas(); setupInput(); buildToolbar();
  // Run one synchronous power pass before the tick loop starts so power state
  // is correct immediately — prevents any single-frame window of stale values.
  G.power.out=0; G.power.in=0;
  const _pm=perkMult();
  for(const m of Object.values(G.machines)){
    if(!m.active)continue;
    if(m.type==='generator'||m.type==='burner'){
      if((m.inBuf.coal||0)>0) G.power.out+=Math.abs(MDEFS[m.type].power);
    } else if(m.type!=='stone_furnace'&&m.type!=='blast_furnace'){
      const def=MDEFS[m.type];
      if(def&&def.power>0){
        const modEff=(m.modules||[]).some(x=>x==='eff_module')?0.7:1;
        G.power.in+=def.power*_pm.power*modEff;
      }
    }
  }
  updateHUD();
  startTick(); startRender();
  if(G.music!==false) musicStart();
  const ts=TILE*G.cam.zoom;
  G.cam.x=26*ts-canvas.width/2+ts*3;
  G.cam.y=24*ts-canvas.height/2+ts*2;
  clampCam();
  if(isNew){
    setTimeout(()=>showModal('⛏️ IRONFIELD',
      `<div style="font-size:6px;color:var(--text2);line-height:2.4">
        You've crashed on Ironfield.<br>No machines. No power. Nothing.<br><br>
        Select <span style="color:var(--amber)">⛏️ Mine</span> to collect resources.<br>
        Tap <span style="color:var(--amber)">🔨 Craft</span> in the toolbar<br>to build your first machines.<br><br>
        Build a rocket to escape this rock.
      </div>`,
      `<button class="btn btn-teal btn-sm" onclick="closeModal()">LET'S GO</button>`
    ),700);
  }
}
